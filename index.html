<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אוצר הספרים</title>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700;900&family=Heebo:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0d0a07;
    --surface:  #161008;
    --card:     #1e1508;
    --border:   #3a2a10;
    --gold:     #c9922a;
    --gold2:    #e8b84b;
    --gold3:    #f5d78e;
    --text:     #f0e6d0;
    --muted:    #8a7055;
    --red:      #c0392b;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── BACKGROUND ─── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, #3a2008 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 80% 80%, #1a0e04 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }

  .wrap { position: relative; z-index: 1; }

  /* ─── HEADER ─── */
  header {
    text-align: center;
    padding: 60px 20px 40px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #1a0e04 0%, transparent 100%);
  }

  .logo-ornament {
    font-size: 28px; letter-spacing: 8px;
    color: var(--gold); margin-bottom: 12px;
    animation: fadeIn 1s ease;
  }

  h1 {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: clamp(36px, 6vw, 72px);
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold3) 0%, var(--gold) 50%, var(--gold2) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    line-height: 1.1; margin-bottom: 10px;
    animation: fadeIn 1s ease 0.2s both;
  }

  .subtitle {
    color: var(--muted); font-size: 15px; letter-spacing: 2px;
    animation: fadeIn 1s ease 0.4s both;
  }

  /* ─── SEARCH ─── */
  .search-wrap {
    max-width: 680px; margin: 40px auto 0;
    padding: 0 20px;
    animation: slideUp 0.8s ease 0.3s both;
  }

  .search-box {
    display: flex; gap: 0;
    border: 1.5px solid var(--border);
    border-radius: 12px; overflow: hidden;
    background: var(--card);
    box-shadow: 0 4px 40px #0008;
    transition: border-color 0.3s;
  }
  .search-box:focus-within { border-color: var(--gold); }

  .search-box input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: 'Heebo', sans-serif;
    font-size: 17px; padding: 16px 20px;
    direction: rtl;
  }
  .search-box input::placeholder { color: var(--muted); }

  .search-box button {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border: none; cursor: pointer; padding: 0 28px;
    color: #1a0e04; font-weight: 700; font-size: 15px;
    font-family: 'Heebo', sans-serif;
    transition: opacity 0.2s;
  }
  .search-box button:hover { opacity: 0.85; }

  /* ─── MAIN ─── */
  main { max-width: 1200px; margin: 0 auto; padding: 40px 20px 80px; }

  /* ─── SECTION TITLE ─── */
  .section-title {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 26px; font-weight: 700;
    color: var(--gold2); margin-bottom: 24px;
    display: flex; align-items: center; gap: 12px;
  }
  .section-title::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  /* ─── BOOK GRID ─── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px; margin-bottom: 50px;
  }

  .book-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
    cursor: pointer; transition: all 0.3s ease;
    animation: fadeIn 0.5s ease both;
  }
  .book-card:hover {
    border-color: var(--gold);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px #0006;
  }

  .book-cover {
    height: 130px; position: relative;
    background: linear-gradient(135deg, #2a1a05, #1a0e04);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .book-cover::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg,
      rgba(201,146,42,0.15) 0%,
      transparent 60%,
      rgba(201,146,42,0.05) 100%);
  }
  .book-cover-text {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 40px; color: rgba(201,146,42,0.3);
  }
  .book-category-badge {
    position: absolute; top: 10px; right: 10px;
    background: rgba(201,146,42,0.15);
    border: 1px solid rgba(201,146,42,0.3);
    color: var(--gold2); font-size: 11px;
    padding: 3px 8px; border-radius: 20px;
  }

  .book-info { padding: 14px; }
  .book-title {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 16px; font-weight: 700;
    color: var(--text); margin-bottom: 5px;
    line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .book-author { font-size: 12px; color: var(--muted); margin-bottom: 12px; }

  .read-btn {
    width: 100%; padding: 8px;
    background: linear-gradient(135deg, rgba(201,146,42,0.15), rgba(201,146,42,0.08));
    border: 1px solid rgba(201,146,42,0.3);
    border-radius: 7px; color: var(--gold2);
    font-family: 'Heebo', sans-serif; font-size: 13px;
    cursor: pointer; transition: all 0.2s;
  }
  .read-btn:hover {
    background: linear-gradient(135deg, rgba(201,146,42,0.3), rgba(201,146,42,0.15));
    border-color: var(--gold);
  }

  /* ─── PDF VIEWER ─── */
  .viewer-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: none; flex-direction: column;
    animation: fadeIn 0.3s ease;
  }
  .viewer-overlay.open { display: flex; }

  .viewer-header {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .viewer-title {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 20px; color: var(--gold2);
  }

  .viewer-controls { display: flex; gap: 10px; align-items: center; }

  .ctrl-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 7px 16px;
    border-radius: 7px; cursor: pointer;
    font-family: 'Heebo', sans-serif; font-size: 13px;
    transition: all 0.2s;
  }
  .ctrl-btn:hover { border-color: var(--gold); color: var(--gold2); }
  .ctrl-btn.close-btn {
    background: rgba(192,57,43,0.15);
    border-color: rgba(192,57,43,0.4);
    color: #e74c3c;
  }
  .ctrl-btn.close-btn:hover { background: rgba(192,57,43,0.3); }

  .viewer-body { flex: 1; overflow: hidden; }

  .viewer-body iframe {
    width: 100%; height: 100%;
    border: none;
  }

  /* ─── LOADING ─── */
  .loading {
    text-align: center; padding: 60px 20px;
    color: var(--muted);
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  /* ─── ERROR ─── */
  .error-box {
    background: rgba(192,57,43,0.1);
    border: 1px solid rgba(192,57,43,0.3);
    border-radius: 10px; padding: 20px;
    color: #e74c3c; text-align: center;
    margin: 20px 0;
  }

  /* ─── PAGINATION ─── */
  .pagination {
    display: flex; justify-content: center;
    gap: 8px; margin-top: 30px;
  }
  .page-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 8px 16px;
    border-radius: 7px; cursor: pointer;
    font-family: 'Heebo', sans-serif;
    transition: all 0.2s;
  }
  .page-btn:hover, .page-btn.active {
    border-color: var(--gold); color: var(--gold2);
    background: rgba(201,146,42,0.1);
  }

  /* ─── STATS BAR ─── */
  .stats {
    display: flex; gap: 30px; justify-content: center;
    flex-wrap: wrap; padding: 20px;
    margin-bottom: 30px;
    border: 1px solid var(--border);
    border-radius: 12px; background: var(--card);
    animation: fadeIn 0.6s ease 0.5s both;
  }
  .stat { text-align: center; }
  .stat-num {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 28px; font-weight: 700;
    color: var(--gold2);
  }
  .stat-label { font-size: 12px; color: var(--muted); }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
  @keyframes spin { to { transform: rotate(360deg); } }

  .book-card:nth-child(1) { animation-delay: 0.05s; }
  .book-card:nth-child(2) { animation-delay: 0.10s; }
  .book-card:nth-child(3) { animation-delay: 0.15s; }
  .book-card:nth-child(4) { animation-delay: 0.20s; }
  .book-card:nth-child(5) { animation-delay: 0.25s; }
  .book-card:nth-child(6) { animation-delay: 0.30s; }
  .book-card:nth-child(7) { animation-delay: 0.35s; }
  .book-card:nth-child(8) { animation-delay: 0.40s; }
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <header>
    <div class="logo-ornament">✦ ✦ ✦</div>
    <h1>אוצר הספרים</h1>
    <div class="subtitle">ספרייה יהודית דיגיטלית • מעל 100,000 ספרים</div>

    <div class="search-wrap">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="חפש ספר, מחבר, נושא..." />
        <button onclick="doSearch()">🔍 חיפוש</button>
      </div>
    </div>
  </header>

  <main>

    <!-- STATS -->
    <div class="stats">
      <div class="stat"><div class="stat-num">100,000+</div><div class="stat-label">ספרים</div></div>
      <div class="stat"><div class="stat-num">500+</div><div class="stat-label">שנות תוכן</div></div>
      <div class="stat"><div class="stat-num">∞</div><div class="stat-label">גישה חינמית</div></div>
    </div>

    <!-- FEATURED -->
    <div class="section-title">📖 ספרים מובחרים</div>
    <div class="grid" id="featuredGrid">
      <div class="loading"><div class="spinner"></div>טוען...</div>
    </div>

    <!-- SEARCH RESULTS -->
    <div id="searchSection" style="display:none">
      <div class="section-title">🔍 תוצאות חיפוש: <span id="searchTerm"></span></div>
      <div class="grid" id="resultsGrid"></div>
      <div class="pagination" id="pagination"></div>
    </div>

  </main>
</div>

<!-- PDF VIEWER -->
<div class="viewer-overlay" id="viewer">
  <div class="viewer-header">
    <div class="viewer-title" id="viewerTitle">טוען ספר...</div>
    <div class="viewer-controls">
      <button class="ctrl-btn" onclick="downloadPdf()">⬇ הורד PDF</button>
      <button class="ctrl-btn close-btn" onclick="closeViewer()">✕ סגור</button>
    </div>
  </div>
  <div class="viewer-body">
    <iframe id="pdfFrame" src=""></iframe>
  </div>
</div>

<script>
const API = '/api';
let currentBookId = null;
let currentPage = 1;
let currentQuery = '';

// ─── BOOK COLORS ───────────────────────────────────────────────
const covers = ['📜','📚','🕎','✡️','📖','🔯','🕍','📿'];

function bookCard(book) {
  const icon = covers[parseInt(book.id) % covers.length];
  return `
    <div class="book-card" onclick="openBook('${book.id}', '${escHtml(book.title)}')">
      <div class="book-cover">
        <div class="book-cover-text">${icon}</div>
        ${book.category ? `<div class="book-category-badge">${book.category}</div>` : ''}
      </div>
      <div class="book-info">
        <div class="book-title">${escHtml(book.title)}</div>
        <div class="book-author">${escHtml(book.author || '')}</div>
        <button class="read-btn">📖 קרא עכשיו</button>
      </div>
    </div>`;
}

function escHtml(str) {
  return String(str || '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ─── LOAD FEATURED ──────────────────────────────────────────────
async function loadFeatured() {
  try {
    const r = await fetch(`${API}/featured`);
    const d = await r.json();
    document.getElementById('featuredGrid').innerHTML =
      d.books.map(bookCard).join('');
  } catch(e) {
    document.getElementById('featuredGrid').innerHTML =
      `<div class="error-box">⚠️ לא ניתן להתחבר לשרת<br><small>ודא שהשרת רץ על port 5000</small></div>`;
  }
}

// ─── SEARCH ─────────────────────────────────────────────────────
async function doSearch(page = 1) {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  currentQuery = q;
  currentPage = page;

  document.getElementById('searchSection').style.display = 'block';
  document.getElementById('searchTerm').textContent = q;
  document.getElementById('resultsGrid').innerHTML =
    '<div class="loading"><div class="spinner"></div>מחפש...</div>';

  try {
    const r = await fetch(`${API}/search?q=${encodeURIComponent(q)}&page=${page}`);
    const d = await r.json();

    if (!d.books.length) {
      document.getElementById('resultsGrid').innerHTML =
        '<div class="loading">לא נמצאו תוצאות</div>';
      return;
    }

    document.getElementById('resultsGrid').innerHTML = d.books.map(bookCard).join('');
    renderPagination(page);

    document.getElementById('searchSection').scrollIntoView({behavior:'smooth'});
  } catch(e) {
    document.getElementById('resultsGrid').innerHTML =
      `<div class="error-box">שגיאת חיפוש: ${e.message}</div>`;
  }
}

function renderPagination(current) {
  const p = document.getElementById('pagination');
  p.innerHTML = '';
  for (let i = Math.max(1, current-2); i <= current+3; i++) {
    const btn = document.createElement('button');
    btn.className = 'page-btn' + (i === current ? ' active' : '');
    btn.textContent = i;
    btn.onclick = () => doSearch(i);
    p.appendChild(btn);
  }
}

// ─── OPEN BOOK ──────────────────────────────────────────────────
function openBook(id, title) {
  currentBookId = id;
  document.getElementById('viewerTitle').textContent = title;
  document.getElementById('pdfFrame').src = `${API}/pdf/${id}`;
  document.getElementById('viewer').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeViewer() {
  document.getElementById('viewer').classList.remove('open');
  document.getElementById('pdfFrame').src = '';
  document.body.style.overflow = '';
}

function downloadPdf() {
  if (!currentBookId) return;
  const a = document.createElement('a');
  a.href = `${API}/pdf/${currentBookId}`;
  a.download = `book_${currentBookId}.pdf`;
  a.click();
}

// ─── ENTER KEY ──────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

// ─── INIT ────────────────────────────────────────────────────────
loadFeatured();
</script>
</body>
</html>
