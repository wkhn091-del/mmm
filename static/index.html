<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>גנזך • ספרייה יהודית</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Hebrew:wght@400;600;700;900&family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --white:#fff;--bg:#f7f8fc;--bg2:#eef0f8;
  --surface:#fff;--border:#e2e5ef;--border2:#cdd1e8;
  --blue:#2563eb;--blue-lt:#eff6ff;--blue-dk:#1d4ed8;
  --green:#059669;--green-lt:#ecfdf5;
  --amber:#d97706;--amber-lt:#fffbeb;
  --purple:#7c3aed;--purple-lt:#f5f3ff;
  --red:#dc2626;
  --text:#111827;--text2:#374151;--text3:#6b7280;--text4:#9ca3af;
  --radius:10px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --sh2:0 4px 16px rgba(0,0,0,.09);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Heebo',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── SHELL ─────────────────────────────────────── */
.shell{display:grid;grid-template-columns:250px 1fr;grid-template-rows:64px 1fr;grid-template-areas:"nav top""nav main";height:100vh}

/* ── NAV ─────────────────────────────────────────── */
nav{grid-area:nav;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.nav-logo{padding:18px 18px 14px;border-bottom:1px solid var(--border)}
.logo{font-family:'Noto Serif Hebrew',serif;font-size:22px;font-weight:900;color:var(--blue);line-height:1}
.logo-sub{font-size:11px;color:var(--text4);margin-top:3px}
.nav-sec{padding:12px 10px 4px}
.nav-sec-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--text4);text-transform:uppercase;padding:0 8px;margin-bottom:4px}
.nb{display:flex;align-items:center;gap:9px;width:100%;padding:8px 12px;border:none;background:none;border-radius:8px;font-family:'Heebo',sans-serif;font-size:14px;color:var(--text2);cursor:pointer;text-align:right;transition:all .15s}
.nb:hover{background:var(--bg);color:var(--text)}
.nb.on{background:var(--blue-lt);color:var(--blue);font-weight:600}
.nb .ic{font-size:16px;flex-shrink:0}
.nb .bc{margin-right:auto;background:var(--bg2);color:var(--text3);font-size:11px;padding:1px 7px;border-radius:20px}
.nb.on .bc{background:rgba(37,99,235,.1);color:var(--blue)}
.ndiv{height:1px;background:var(--border);margin:8px 14px}

/* progress */
.prog-box{margin:10px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;margin-top:auto}
.prog-row{display:flex;justify-content:space-between;margin-bottom:6px}
.prog-lbl{font-size:12px;color:var(--text3)}
.prog-val{font-size:13px;font-weight:700;color:var(--blue)}
.prog-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:4px}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--blue),#60a5fa);border-radius:3px;transition:width 1.5s ease}
.prog-sub{font-size:11px;color:var(--text4)}

/* sources pills */
.src-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.sp{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid}
.sp.hb{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}
.sp.sef{background:#f5f3ff;border-color:#ddd6fe;color:#6d28d9}
.sp.ocr{background:#ecfdf5;border-color:#a7f3d0;color:#065f46}

/* ── TOPBAR ──────────────────────────────────────── */
header{grid-area:top;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 24px;box-shadow:var(--sh);z-index:40}
.srch{flex:1;max-width:520px;position:relative}
.srch input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;font-family:'Heebo',sans-serif;font-size:14px;color:var(--text);padding:9px 40px 9px 14px;outline:none;transition:border-color .2s,box-shadow .2s;direction:rtl}
.srch input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);background:var(--white)}
.srch input::placeholder{color:var(--text4)}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text4);font-size:15px;pointer-events:none}
.top-stat{display:flex;align-items:center;gap:6px;background:var(--green-lt);border:1px solid #a7f3d0;border-radius:8px;padding:6px 13px;font-size:13px;color:var(--green);font-weight:600;white-space:nowrap}

/* source filter tabs in topbar */
.src-tabs{display:flex;gap:4px}
.st{padding:6px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--white);font-family:'Heebo',sans-serif;font-size:12px;color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap}
.st:hover{border-color:var(--blue);color:var(--blue)}
.st.on{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600}

/* ── MAIN ──────────────────────────────────────────── */
main{grid-area:main;overflow-y:auto;padding:26px 28px 60px}
.pgh{margin-bottom:20px}
.pgt{font-family:'Noto Serif Hebrew',serif;font-size:22px;font-weight:700}
.pgs{font-size:13px;color:var(--text3);margin-top:3px}

/* filter chips */
.frow{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px}
.fc{padding:5px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);font-family:'Heebo',sans-serif;font-size:13px;color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap}
.fc:hover{border-color:var(--blue);color:var(--blue)}
.fc.on{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600}

/* ── GRID ──────────────────────────────────────────── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:16px;margin-bottom:32px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .2s ease;animation:rise .35s ease both;position:relative}
.card:hover{border-color:var(--blue);box-shadow:var(--sh2);transform:translateY(-2px)}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* spine color by subject */
.bc-הלכה .cs{background:linear-gradient(135deg,#1e40af,#2563eb)}
.bc-מוסר .cs{background:linear-gradient(135deg,#065f46,#059669)}
.bc-חסידות .cs{background:linear-gradient(135deg,#5b21b6,#7c3aed)}
.bc-פרשנות .cs{background:linear-gradient(135deg,#92400e,#d97706)}
.bc-קבלה .cs{background:linear-gradient(135deg,#9d174d,#db2777)}
.bc-שו"ת .cs{background:linear-gradient(135deg,#0e7490,#0891b2)}
.bc-מחשבה .cs{background:linear-gradient(135deg,#3730a3,#4f46e5)}
.bc-פילוסופיה .cs{background:linear-gradient(135deg,#064e3b,#047857)}
.bc-תנ"ך .cs{background:linear-gradient(135deg,#7c2d12,#c2410c)}
.bc-אגדה .cs{background:linear-gradient(135deg,#1e3a5f,#1d4ed8)}
.bc-מועדים .cs{background:linear-gradient(135deg,#78350f,#b45309)}
.bc-שבת .cs{background:linear-gradient(135deg,#134e4a,#0f766e)}
.bc-תלמוד .cs{background:linear-gradient(135deg,#3b0764,#7e22ce)}
.bc-משנה .cs{background:linear-gradient(135deg,#1c1917,#44403c)}
.bc-מדרש .cs{background:linear-gradient(135deg,#0c4a6e,#0369a1)}
.bc-תפילה .cs{background:linear-gradient(135deg,#4a044e,#86198f)}
.bc-תוספתא .cs{background:linear-gradient(135deg,#14532d,#166534)}

.cs{height:110px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:linear-gradient(135deg,#1e3a5f,#2563eb)}
.cs::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12),rgba(255,255,255,0))}
.cs-letter{font-family:'Noto Serif Hebrew',serif;font-size:46px;font-weight:900;color:rgba(255,255,255,.18);z-index:1;user-select:none}
.cs-src{position:absolute;top:8px;left:8px;font-size:9px;padding:2px 7px;border-radius:20px;font-weight:600;letter-spacing:.3px}
.cs-src.hb{background:rgba(255,255,255,.2);color:rgba(255,255,255,.9)}
.cs-src.sef{background:rgba(167,139,250,.4);color:#fff}
.cs-cat{position:absolute;bottom:8px;right:8px;font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(0,0,0,.25);color:rgba(255,255,255,.85)}

/* text badge */
.text-badge{position:absolute;top:8px;right:8px;background:var(--green);color:#fff;font-size:9px;padding:2px 7px;border-radius:20px;font-weight:700;z-index:5}

.cb{padding:11px 12px 10px}
.ct{font-family:'Noto Serif Hebrew',serif;font-size:14px;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ca{font-size:12px;color:var(--text3);margin-bottom:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-height:16px}
.card-btns{display:flex;gap:6px}
.cbtn{flex:1;padding:7px 4px;border-radius:7px;border:1.5px solid var(--border);background:transparent;color:var(--blue);font-family:'Heebo',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:3px}
.cbtn:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.cbtn.ocr-btn{color:var(--green);border-color:#a7f3d0}
.cbtn.ocr-btn:hover{background:var(--green);color:#fff;border-color:var(--green)}

/* ── PAGINATION ─────────────────────────────────── */
.pager{display:flex;justify-content:center;align-items:center;gap:5px;padding:16px 0 8px}
.pb{min-width:34px;height:34px;border-radius:8px;border:1.5px solid var(--border);background:var(--white);color:var(--text2);font-family:'Heebo',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;padding:0 8px}
.pb:hover:not(:disabled){border-color:var(--blue);color:var(--blue);background:var(--blue-lt)}
.pb.on{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:700}
.pb:disabled{opacity:.3;cursor:default}

/* ── LOADER ───────────────────────────────────────── */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:14px;color:var(--text3)}
.spin{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:80px 20px}
.empty-icon{font-size:52px;margin-bottom:14px;opacity:.2}
.empty-title{font-size:17px;font-weight:600;color:var(--text2);margin-bottom:6px}

/* ── VIEWER ───────────────────────────────────────── */
.vov{position:fixed;inset:0;background:rgba(15,20,40,.55);backdrop-filter:blur(6px);z-index:200;display:none;align-items:center;justify-content:center;animation:fi .2s ease}
.vov.open{display:flex}
@keyframes fi{from{opacity:0}to{opacity:1}}
.vshell{width:min(1100px,96vw);height:90vh;background:var(--surface);border-radius:16px;border:1px solid var(--border);box-shadow:0 24px 60px rgba(0,0,0,.18);display:flex;flex-direction:column;overflow:hidden}
.vbar{display:flex;align-items:center;gap:10px;padding:11px 18px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.vtitle{flex:1;font-family:'Noto Serif Hebrew',serif;font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vb{height:32px;padding:0 13px;border-radius:7px;border:1.5px solid var(--border);background:var(--white);color:var(--text2);font-family:'Heebo',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.vb:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt)}
.vb.cl{border-color:transparent}
.vb.cl:hover{background:#fee2e2;color:var(--red);border-color:#fca5a5}
.vb.active{background:var(--blue);color:#fff;border-color:var(--blue)}

/* viewer tabs */
.vtabs{display:flex;gap:2px;padding:0 18px 10px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.vtab{padding:6px 16px;border-radius:7px;border:1.5px solid var(--border);background:var(--white);font-family:'Heebo',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;color:var(--text3)}
.vtab:hover{border-color:var(--blue);color:var(--blue)}
.vtab.on{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600}

/* viewer body */
.vbody{flex:1;overflow:hidden;display:flex;flex-direction:column}
.vbody iframe{width:100%;height:100%;border:none}

/* text reader */
.treader{flex:1;overflow-y:auto;padding:32px 48px;direction:rtl}
.treader-content{font-family:'Noto Serif Hebrew',serif;font-size:18px;line-height:2;color:var(--text);max-width:680px;margin:0 auto;white-space:pre-wrap}
.treader-toolbar{display:flex;gap:8px;padding:12px 18px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;align-items:center}
.fsize-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--white);cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s}
.fsize-btn:hover{border-color:var(--blue);color:var(--blue)}
.ocr-trigger{padding:6px 14px;border-radius:7px;border:1.5px solid #a7f3d0;background:var(--green-lt);color:var(--green);font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.ocr-trigger:hover{background:var(--green);color:#fff;border-color:var(--green)}
.ocr-running{color:var(--amber);border-color:#fde68a;background:var(--amber-lt)}

/* ── MOBILE ───────────────────────────────────────── */
@media(max-width:720px){
  .shell{grid-template-columns:1fr;grid-template-rows:56px 1fr;grid-template-areas:"top""main"}
  nav{display:none}
  main{padding:16px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px}
  .vshell{width:100%;height:100%;border-radius:0}
  .src-tabs,.top-stat{display:none}
  .treader{padding:20px}
  .treader-content{font-size:16px}
}

/* ── BOOK FLIP VIEWER ──────────────────────────────── */
.flip-container{
  flex:1;display:flex;align-items:center;justify-content:center;
  background:#2a2a3a;position:relative;overflow:hidden;
  user-select:none;
}
.flip-page{
  position:absolute;
  width:min(520px,85vw);height:min(740px,85vh);
  background:#fffef8;
  border-radius:4px 12px 12px 4px;
  box-shadow:4px 4px 20px rgba(0,0,0,.5),-2px 0 8px rgba(0,0,0,.3);
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:transform .4s cubic-bezier(.4,0,.2,1),opacity .3s ease;
}
.flip-page.leaving-right{
  transform:translateX(110%) rotateY(-15deg);
  opacity:0;
}
.flip-page.leaving-left{
  transform:translateX(-110%) rotateY(15deg);
  opacity:0;
}
.flip-page.entering-right{
  transform:translateX(110%);
  opacity:0;
}
.flip-page.entering-left{
  transform:translateX(-110%);
  opacity:0;
}

.flip-page-header{
  background:linear-gradient(135deg,#1e3a5f,#2563eb);
  padding:10px 18px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.flip-book-title{
  font-family:'Noto Serif Hebrew',serif;
  font-size:13px;color:rgba(255,255,255,.85);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:300px;
}
.flip-page-num{
  font-size:12px;color:rgba(255,255,255,.6);
  flex-shrink:0;
}

.flip-page-content{
  flex:1;overflow:hidden;
  font-family:'Noto Serif Hebrew',serif;
  font-size:15px;line-height:2;
  color:#1a1a2e;
  padding:24px 28px;
  direction:rtl;text-align:right;
  white-space:pre-wrap;word-wrap:break-word;
}

.flip-page-footer{
  padding:8px 18px;
  border-top:1px solid #e8e4d8;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;background:#faf9f5;
}
.flip-dots{display:flex;gap:6px;align-items:center}
.flip-dot{
  width:6px;height:6px;border-radius:50%;
  background:#d0ccc0;cursor:pointer;transition:all .2s;
}
.flip-dot.active{background:var(--blue);transform:scale(1.3)}

/* nav arrows */
.flip-arrow{
  position:absolute;
  top:50%;transform:translateY(-50%);
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.15);
  border:2px solid rgba(255,255,255,.3);
  color:rgba(255,255,255,.8);
  font-size:20px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;z-index:10;
  backdrop-filter:blur(4px);
}
.flip-arrow:hover{background:rgba(255,255,255,.3);color:#fff}
.flip-arrow.left{left:16px}
.flip-arrow.right{right:16px}
.flip-arrow:disabled{opacity:.2;cursor:default}

/* progress bar */
.flip-progress{
  position:absolute;bottom:0;left:0;right:0;
  height:3px;background:rgba(255,255,255,.1);
}
.flip-progress-fill{
  height:100%;background:var(--blue);
  transition:width .3s ease;
}


/* ── ADVANCED FEATURES PANEL ────────────────────── */
.feat-panel{
  display:flex;flex-direction:column;height:100%;
  background:var(--surface);
}
.feat-tabs{
  display:flex;gap:0;
  border-bottom:2px solid var(--border);
  background:var(--bg);
  flex-shrink:0;overflow-x:auto;
}
.ft{
  padding:10px 16px;border:none;background:none;
  font-family:'Heebo',sans-serif;font-size:13px;
  color:var(--text3);cursor:pointer;
  border-bottom:2px solid transparent;
  margin-bottom:-2px;white-space:nowrap;
  transition:all .15s;
}
.ft:hover{color:var(--blue);background:var(--blue-lt)}
.ft.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}

.feat-body{flex:1;overflow-y:auto;padding:20px}

/* search in book */
.book-search-bar{
  display:flex;gap:8px;margin-bottom:16px;
}
.book-search-bar input{
  flex:1;padding:9px 14px;border:1.5px solid var(--border);
  border-radius:8px;font-family:'Heebo',sans-serif;font-size:14px;
  outline:none;direction:rtl;
}
.book-search-bar input:focus{border-color:var(--blue)}
.book-search-bar button{
  padding:9px 18px;border-radius:8px;border:none;
  background:var(--blue);color:#fff;
  font-family:'Heebo',sans-serif;font-size:13px;cursor:pointer;
}

.result-item{
  padding:12px;border:1px solid var(--border);border-radius:8px;
  margin-bottom:8px;cursor:pointer;transition:all .15s;
}
.result-item:hover{border-color:var(--blue);background:var(--blue-lt)}
.result-highlight{background:#fef08a;padding:1px 3px;border-radius:3px}

/* TOC */
.toc-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:7px;cursor:pointer;
  transition:all .15s;font-family:'Noto Serif Hebrew',serif;
  font-size:14px;color:var(--text2);
}
.toc-item:hover{background:var(--blue-lt);color:var(--blue)}
.toc-num{
  font-size:11px;color:var(--text4);
  min-width:30px;text-align:left;
}

/* AI panel */
.ai-textarea{
  width:100%;min-height:100px;padding:12px;
  border:1.5px solid var(--border);border-radius:8px;
  font-family:'Noto Serif Hebrew',serif;font-size:14px;
  line-height:1.8;resize:vertical;outline:none;direction:rtl;
  margin-bottom:10px;
}
.ai-textarea:focus{border-color:var(--blue)}
.ai-result{
  background:var(--bg);border:1px solid var(--border);
  border-radius:8px;padding:16px;
  font-family:'Noto Serif Hebrew',serif;font-size:14px;
  line-height:1.9;direction:rtl;white-space:pre-wrap;
  min-height:80px;
}
.ai-btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.ai-btn{
  padding:8px 16px;border-radius:8px;
  border:1.5px solid var(--border);
  background:var(--white);color:var(--text2);
  font-family:'Heebo',sans-serif;font-size:13px;
  cursor:pointer;transition:all .15s;
}
.ai-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt)}
.ai-btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.ai-btn.primary:hover{opacity:.85}

/* related */
.related-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:10px;
}
.rel-card{
  padding:12px;border:1px solid var(--border);border-radius:8px;
  cursor:pointer;transition:all .15s;text-align:right;
}
.rel-card:hover{border-color:var(--blue);background:var(--blue-lt)}
.rel-title{font-family:'Noto Serif Hebrew',serif;font-size:13px;font-weight:700;margin-bottom:4px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rel-author{font-size:11px;color:var(--text3)}

/* fulltext search */
.fts-result{
  padding:14px;border:1px solid var(--border);border-radius:8px;
  margin-bottom:10px;cursor:pointer;transition:all .15s;
}
.fts-result:hover{border-color:var(--blue);background:var(--blue-lt)}
.fts-book{font-weight:700;color:var(--text);margin-bottom:4px;font-size:14px}
.fts-excerpt{font-size:13px;color:var(--text3);line-height:1.6;direction:rtl}

</style>
</head>
<body>
<div class="shell">

<!-- ══ NAV ═══════════════════════════════════ -->
<nav>
  <div class="nav-logo">
    <div class="logo">גנזך</div>
    <div class="logo-sub">ספרייה יהודית דיגיטלית</div>
  </div>

  <div class="nav-sec">
    <div class="nav-sec-lbl">ניווט</div>
    <button class="nb on" id="nb-home" onclick="goHome()">
      <span class="ic">🏠</span> ספרייה ראשית
    </button>
    <button class="nb" id="nb-all" onclick="goAll()">
      <span class="ic">📚</span> כל הספרים
    </button>
    <button class="nb" id="nb-text" onclick="goText()">
      <span class="ic">📝</span> ספרים עם טקסט
      <span class="bc" id="textCount">…</span>
    </button>
    <button class="nb" id="nb-fts" onclick="goFTS()">
      <span class="ic">🔍</span> חיפוש בכל הטקסטים
    </button>
    <button class="nb" id="nb-daily" onclick="goDaily()">
      <span class="ic">📅</span> לימוד יומי
    </button>
  </div>

  <div class="ndiv"></div>

  <div class="nav-sec">
    <div class="nav-sec-lbl">מקורות</div>
    <button class="nb" id="nb-hb" onclick="goSource('hebrewbooks')">
      <span class="ic">📖</span> HebrewBooks
      <span class="bc" id="hbCount">…</span>
    </button>
    <button class="nb" id="nb-sef" onclick="goSource('sefaria')">
      <span class="ic">✨</span> Sefaria
      <span class="bc" id="sefCount">…</span>
    </button>
    <button class="nb" id="nb-by" onclick="goSource('benyehuda')">
      <span class="ic">📚</span> פרויקט בן-יהודה
      <span class="bc" id="byCount">…</span>
    </button>
    <button class="nb" id="nb-ws" onclick="goSource('wikisource')">
      <span class="ic">🌐</span> ויקיטקסט
      <span class="bc" id="wsCount">…</span>
    </button>
    <button class="nb" id="nb-mamre" onclick="goSource('mamre')">
      <span class="ic">📜</span> מכון ממרא
      <span class="bc" id="mamreCount">…</span>
    </button>
    <button class="nb" id="nb-daat" onclick="goSource('daat')">
      <span class="ic">🕌</span> דעת
      <span class="bc" id="daatCount">…</span>
    </button>
  </div>

  <div class="ndiv"></div>

  <div class="nav-sec">
    <div class="nav-sec-lbl">קטגוריות</div>
    <div id="catList"></div>
  </div>

  <div class="prog-box">
    <div class="prog-row">
      <span class="prog-lbl">📚 סה"כ ספרים</span>
      <span class="prog-val" id="pTotal">0</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="pFill"></div></div>
    <div class="prog-sub">יעד: 100,000 ספרים</div>
    <div class="src-pills" id="srcPills"></div>
  </div>
</nav>

<!-- ══ TOPBAR ═══════════════════════════════════ -->
<header>
  <div class="srch">
    <span class="si">🔍</span>
    <input id="q" type="text" placeholder="חפש ספר, מחבר, נושא..." autocomplete="off">
  </div>
  <div class="src-tabs">
    <button class="st on" onclick="setSrcTab('')"   id="st-all">הכל</button>
    <button class="st"    onclick="setSrcTab('hebrewbooks')" id="st-hb">📖 עתיקים</button>
    <button class="st"    onclick="setSrcTab('sefaria')"     id="st-sef">✨ חדשים</button>
  </div>
  <div class="top-stat">📚 <span id="topTotal">…</span> ספרים</div>
</header>

<!-- ══ MAIN ══════════════════════════════════════ -->
<main id="main">
  <div class="loader"><div class="spin"></div>טוען ספרייה...</div>
</main>
</div>

<!-- ══ VIEWER ══════════════════════════════════════ -->
<div class="vov" id="vov">
  <div class="vshell">
    <div class="vbar">
      <div class="vtitle" id="vtitle">טוען...</div>
      <button class="vb" id="vDlBtn" onclick="vDownload()">⬇ הורד</button>
      <button class="vb" id="vNewBtn" onclick="vNewTab()">↗ חלון חדש</button>
      <button class="vb cl" onclick="closeV()">✕</button>
    </div>
    <div class="vtabs" id="vtabs">
      <button class="vtab on" id="vtab-pdf"  onclick="switchTab('pdf')">📄 קריאת PDF</button>
      <button class="vtab"    id="vtab-text" onclick="switchTab('text')">📝 טקסט קריא</button>
      <button class="vtab"    id="vtab-flip" onclick="switchTab('flip')">📖 דפדוף ספר</button>
      <button class="vtab"    id="vtab-toc"  onclick="switchTab('toc')">📑 תוכן עניינים</button>
      <button class="vtab"    id="vtab-search-book" onclick="switchTab('search-book')">🔍 חיפוש בספר</button>
      <button class="vtab"    id="vtab-related" onclick="switchTab('related')">📚 ספרים קשורים</button>
      <button class="vtab"    id="vtab-ai"   onclick="switchTab('ai')">🤖 AI — פרש/תרגם</button>
    </div>
    <div class="vbody" id="vbody">
      <iframe id="vframe" src=""></iframe>
    </div>
  </div>
</div>

<script>
// ══ STATE ══════════════════════════════════════════
const S = {
  q:'', subj:'', page:1, source:'',
  bid:null, btitle:'', bsource:'',
  tab:'pdf', fs:18,
  mode:'home', hasText:false,
  subjects: []
};

const $=id=>document.getElementById(id);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ══ CARD SUBJECT CLASS ══════════════════════════════
const SUBJ_LIST=['הלכה','מוסר','חסידות','פרשנות','קבלה','שו"ת','מחשבה','פילוסופיה','תנ"ך','אגדה','מועדים','שבת','תלמוד','משנה','מדרש','תפילה','תוספתא'];
function subjectClass(s){return SUBJ_LIST.includes(s)?`bc-${s}`:'';}

function firstHeb(t){const m=(t||'').match(/[\u05D0-\u05EA]/);return m?m[0]:'ס';}

// ══ RENDER CARD ═════════════════════════════════════
function card(b, i){
  const sc  = subjectClass(b.subject);
  const srcTag = b.source==='sefaria'
    ? '<span class="cs-src sef">Sefaria</span>'
    : '<span class="cs-src hb">HebrewBooks</span>';
  const catTag = b.subject ? `<span class="cs-cat">${esc(b.subject)}</span>` : '';
  const textBadge = b.has_text ? '<span class="text-badge">טקסט ✓</span>' : '';

  const readBtn = `<button class="cbtn" onclick="event.stopPropagation();openBook('${b.id}','${esc(b.title).replace(/'/g,"\\'")}','${b.source}','pdf')">📄 קרא</button>`;
  const textBtn = b.has_text
    ? `<button class="cbtn" onclick="event.stopPropagation();openBook('${b.id}','${esc(b.title).replace(/'/g,"\\'")}','${b.source}','text')">📝 טקסט</button>`
    : b.source==='hebrewbooks'
      ? `<button class="cbtn ocr-btn" onclick="event.stopPropagation();triggerOCR('${b.id}',this)">🔍 OCR</button>`
      : '';

  return `
  <div class="card ${sc}" style="animation-delay:${i*.03}s" onclick="openBook('${b.id}','${esc(b.title).replace(/'/g,"\\'")}','${b.source}','${b.has_text?'text':'pdf'}')">
    ${textBadge}
    <div class="cs">
      <div class="cs-letter">${firstHeb(b.he_title||b.title)}</div>
      ${srcTag}${catTag}
    </div>
    <div class="cb">
      <div class="ct">${esc(b.he_title||b.title)}</div>
      <div class="ca">${esc(b.author||'')}</div>
      <div class="card-btns">${readBtn}${textBtn}</div>
    </div>
  </div>`;
}

function renderBooks(data){
  const {books,total,page,pages}=data;
  if(!books.length){
    $('main').innerHTML=`<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">לא נמצאו ספרים</div><div style="color:var(--text3);font-size:13px">נסה מילת חיפוש אחרת</div></div>`;
    return;
  }
  const chips = (S.mode==='search'||S.subj||S.source) ? renderChips() : '';
  const grid  = `<div class="grid">${books.map(card).join('')}</div>`;
  const pager = pages>1 ? renderPager(page,pages) : '';
  $('main').innerHTML=`
    <div class="pgh">
      <div class="pgt">${esc(pageTitle())}</div>
      <div class="pgs">${total.toLocaleString()} ספרים נמצאו</div>
    </div>
    ${chips}${grid}${pager}`;
  $('main').scrollTop=0;
}

function pageTitle(){
  if(S.mode==='home') return 'ספרים מומלצים';
  if(S.source==='sefaria') return '✨ ספרים חדשים — Sefaria';
  if(S.source==='hebrewbooks') return '📖 HebrewBooks — ספרים עתיקים';
  if(S.hasText) return '📝 ספרים עם טקסט קריא';
  if(S.subj) return S.subj;
  if(S.q) return `תוצאות: "${S.q}"`;
  return 'כל הספרים';
}

// ══ CHIPS ═══════════════════════════════════════════
function renderChips(){
  if(!S.subjects.length) return '';
  const all=`<div class="fc ${!S.subj?'on':''}" onclick="filterSubj('')">הכל</div>`;
  const rest=S.subjects.map(s=>`<div class="fc ${S.subj===s.name?'on':''}" onclick="filterSubj('${esc(s.name)}')">${esc(s.name)}</div>`).join('');
  return `<div class="frow">${all}${rest}</div>`;
}

function filterSubj(s){S.subj=s;S.page=1;loadSearch();}

// ══ PAGER ═══════════════════════════════════════════
function renderPager(cur,tot){
  let h='';
  h+=`<button class="pb" onclick="gp(${cur-1})" ${cur<=1?'disabled':''}>‹</button>`;
  const s=Math.max(1,cur-2),e=Math.min(tot,cur+2);
  if(s>1) h+=`<button class="pb" onclick="gp(1)">1</button>${s>2?'<span style="padding:0 4px;color:var(--text4)">…</span>':''}`;
  for(let i=s;i<=e;i++) h+=`<button class="pb ${i===cur?'on':''}" onclick="gp(${i})">${i}</button>`;
  if(e<tot) h+=`${e<tot-1?'<span style="padding:0 4px;color:var(--text4)">…</span>':''}<button class="pb" onclick="gp(${tot})">${tot}</button>`;
  h+=`<button class="pb" onclick="gp(${cur+1})" ${cur>=tot?'disabled':''}>›</button>`;
  return `<div class="pager">${h}</div>`;
}
function gp(p){S.page=p;loadSearch();}

// ══ VIEWS ═══════════════════════════════════════════
function loader(){$('main').innerHTML='<div class="loader"><div class="spin"></div>טוען...</div>';}

function setNav(id){document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));$(id)&&$(id).classList.add('on');}

async function goHome(){
  S.mode='home';S.q='';S.subj='';S.source='';S.page=1;S.hasText=false;
  setNav('nb-home');$('q').value='';
  loader();
  const d=await fetch('/api/featured').then(r=>r.json());
  renderBooks({books:d.books,total:d.books.length,page:1,pages:1});
}

async function goAll(){
  S.mode='all';S.q='';S.subj='';S.source='';S.page=1;S.hasText=false;
  setNav('nb-all');$('q').value='';loader();await loadSearch();
}

async function goText(){
  S.mode='text';S.q='';S.subj='';S.source='';S.page=1;S.hasText=true;
  setNav('nb-text');$('q').value='';loader();await loadSearch();
}

async function goSource(src){
  S.mode='source';S.q='';S.subj='';S.source=src;S.page=1;S.hasText=false;
  setNav(src==='hebrewbooks'?'nb-hb':'nb-sef');$('q').value='';loader();await loadSearch();
}

function setSrcTab(src){
  S.source=src;S.page=1;
  document.querySelectorAll('.st').forEach(b=>b.classList.remove('on'));
  const ids={'':'st-all','hebrewbooks':'st-hb','sefaria':'st-sef'};
  $(ids[src])&&$(ids[src]).classList.add('on');
  if(S.mode!=='home') loadSearch();
}

async function loadSearch(){
  loader();
  const p=new URLSearchParams({q:S.q,page:S.page,subject:S.subj,source:S.source,has_text:S.hasText?'1':''});
  const d=await fetch(`/api/search?${p}`).then(r=>r.json());
  renderBooks(d);
}

// ══ SIDEBAR CATS ════════════════════════════════════
function buildCats(subjects){
  const ICONS={'הלכה':'⚖️','מוסר':'🌱','חסידות':'✨','פרשנות':'📖','קבלה':'🔯','שו"ת':'📝','מחשבה':'🧠','פילוסופיה':'💡','תנ"ך':'📜','אגדה':'🕯','מועדים':'🎊','שבת':'🕍','תלמוד':'📚','משנה':'📋','מדרש':'🌟','תפילה':'🙏','תוספתא':'📒'};
  $('catList').innerHTML=subjects.slice(0,15).map(s=>`
    <button class="nb ${S.subj===s.name?'on':''}" onclick="clickCat('${esc(s.name)}')">
      <span class="ic">${ICONS[s.name]||'📂'}</span>
      ${esc(s.name)}
      <span class="bc">${s.count}</span>
    </button>`).join('');
}

function clickCat(name){
  S.subj=name;S.mode='cat';S.source='';S.page=1;S.q='';S.hasText=false;
  $('q').value='';
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  loadSearch();
}

// ══ STATS ═══════════════════════════════════════════
async function refreshStats(){
  try{
    const d=await fetch('/api/stats').then(r=>r.json());
    $('pTotal').textContent=d.total.toLocaleString();
    $('topTotal').textContent=d.total.toLocaleString();
    const src=d.by_source||{};
    $('hbCount').textContent=(src.hebrewbooks||0).toLocaleString();
    $('sefCount').textContent=(src.sefaria||0).toLocaleString();
    $('byCount').textContent=(src.benyehuda||0).toLocaleString();
    $('wsCount').textContent=(src.wikisource||0).toLocaleString();
    $('mamreCount').textContent=(src.mamre||0).toLocaleString();
    $('daatCount').textContent=(src.daat||0).toLocaleString();
    $('textCount').textContent=(d.with_text||0).toLocaleString();
    $('pFill').style.width=Math.min(100,d.total/1000)+'%';
    const imp=d.improved||0;
    $('srcPills').innerHTML=`
      <span class="sp hb">HB: ${(src.hebrewbooks||0).toLocaleString()}</span>
      <span class="sp sef">Sefaria: ${(src.sefaria||0).toLocaleString()}</span>
      <span class="sp ocr">בן-יהודה: ${(src.benyehuda||0).toLocaleString()}</span>
      <span class="sp ocr">ויקיטקסט: ${(src.wikisource||0).toLocaleString()}</span>
      <span class="sp ocr">✨ שופרו: ${imp.toLocaleString()}</span>`;
    S.subjects=d.subjects;
    buildCats(d.subjects);
  }catch{}
}

// ══ VIEWER ══════════════════════════════════════════
async function openBook(id,title,source,preferTab){
  S.bid=id;S.btitle=title;S.bsource=source;
  $('vtitle').textContent=title;

  const [info, bdata] = await Promise.all([
    fetch(`/api/viewer/${encodeURIComponent(id)}`).then(r=>r.json()).catch(()=>({})),
    fetch(`/api/book/${encodeURIComponent(id)}`).then(r=>r.json()).catch(()=>({})),
  ]);
  const hasText = !!(bdata.text);

  // טאבים
  const txttab  = $('vtab-text');
  const fliptab = $('vtab-flip');
  txttab.style.display  = (source==='hebrewbooks' || hasText) ? '' : 'none';
  fliptab.style.display = hasText ? '' : 'none';

  // כפתורי topbar
  if(source==='hebrewbooks'){
    $('vDlBtn').style.display='';
    $('vDlBtn').onclick=()=>window.open(`https://hebrewbooks.org/pdfs/${id.replace('hb-','')}.pdf`,'_blank');
    $('vNewBtn').onclick=()=>window.open(info.url||'#','_blank');
  } else {
    $('vDlBtn').style.display='none';
    $('vNewBtn').onclick=()=>window.open(info.url||bdata.url||'#','_blank');
  }

  if(!info.url && bdata.url) info.url = bdata.url;

  // ספרים עם טקסט → פתח תמיד בטקסט קריא
  // HebrewBooks בלי OCR → PDF
  let defaultTab = 'pdf';
  if(hasText) defaultTab = 'text';
  else if(source !== 'hebrewbooks') defaultTab = 'text'; // ימשוך חי
  else defaultTab = 'pdf';

  const tab = preferTab || defaultTab;
  switchTab(tab, info, bdata.text, title);

  $('vov').classList.add('open');
  document.body.style.overflow='hidden';
}

function switchTab(tab, info, text, title){
  S.tab=tab;
  document.querySelectorAll('.vtab').forEach(b=>b.classList.remove('on'));
  $(`vtab-${tab}`)&&$(`vtab-${tab}`).classList.add('on');

  if(tab==='pdf'){
    const src = S.bsource;

    // HebrewBooks — PDF מלא
    if(src==='hebrewbooks'){
      const num = S.bid.replace('hb-','');
      const url = `https://hebrewbooks.org/pdfpager.aspx?req=${num}`;
      $('vbody').innerHTML=`<iframe id="vframe" src="${url}" allowfullscreen></iframe>`;
      return;
    }

    // כל שאר המקורות — iframe לא עובד, פתח בחלון חדש
    let url='';
    if(src==='sefaria'){
      url=`https://www.sefaria.org/${encodeURIComponent(S.btitle)}`;
    } else if(src==='wikisource'){
      // קח URL מהDB
      url = info ? info.url : `https://he.wikisource.org/wiki/${encodeURIComponent(S.btitle)}`;
    } else if(src==='benyehuda'){
      url = info ? info.url : '#';
    } else if(src==='mamre'){
      url = info ? info.url : 'https://www.mechon-mamre.org';
    } else if(src==='daat'){
      url = info ? info.url : 'https://www.daat.ac.il';
    } else if(src==='chabad'){
      url = info ? info.url : 'https://www.chabad.org';
    } else if(src==='archive'){
      const iid = S.bid.replace('ia-','');
      url = `https://archive.org/details/${iid}`;
    } else if(src==='alhatorah'){
      url = info ? info.url : 'https://alhatorah.org';
    } else if(src==='opensiddur'){
      url = info ? info.url : 'https://opensiddur.org';
    } else if(src==='nli'){
      url = info ? info.url : 'https://www.nli.org.il';
    }

    if(url && url !== '#'){
      // הצג כפתור פתיחה ידידותי במקום iframe שבור
      $('vbody').innerHTML=`
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
          height:100%;gap:16px;padding:40px;text-align:center">
          <div style="font-size:52px">📖</div>
          <div style="font-family:'Noto Serif Hebrew',serif;font-size:20px;font-weight:700;color:var(--text)">
            ${esc(S.btitle)}
          </div>
          <div style="font-size:14px;color:var(--text3);max-width:400px">
            ספר זה שמור ב-<strong>${esc(src)}</strong>.<br>
            לחץ לקריאה מלאה באתר המקורי.
          </div>
          <a href="${url}" target="_blank" style="
            display:inline-flex;align-items:center;gap:8px;
            padding:12px 28px;border-radius:10px;
            background:var(--blue);color:#fff;
            font-family:'Heebo',sans-serif;font-size:15px;font-weight:600;
            text-decoration:none;transition:opacity .15s;
          " onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">
            ↗ פתח לקריאה מלאה
          </a>
          <div style="font-size:12px;color:var(--text4)">${url}</div>
        </div>`;
    } else {
      $('vbody').innerHTML=`
        <div style="padding:60px;text-align:center;color:var(--text3)">
          <div style="font-size:40px;margin-bottom:12px">😔</div>
          <div>לא נמצא קישור לספר זה</div>
          <div style="font-size:13px;margin-top:8px">נסה את טאב "📝 טקסט קריא"</div>
        </div>`;
    }
  } else if(tab==='flip'){
    fetchAndShowFlip(S.bid);
  } else if(tab==='toc'){
    showTOC(S.bid);
  } else if(tab==='search-book'){
    showSearchInBook(S.bid);
  } else if(tab==='related'){
    showRelated(S.bid);
  } else if(tab==='ai'){
    showAIPanel(S.bid, S.btitle);
  } else {
    fetchAndShowText(S.bid);
  }
}

async function fetchAndShowText(bid){
  $('vbody').innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
      height:100%;gap:20px;color:var(--text3)">
      <div class="spin"></div>
      <div id="ocrStatus" style="font-size:15px;font-weight:600">טוען טקסט...</div>
      <div id="ocrSub" style="font-size:13px">ממשיך טקסט מהמקור...</div>
      <div id="ocrProgress" style="width:280px;height:6px;background:var(--border);border-radius:3px;overflow:hidden">
        <div id="ocrBar" style="height:100%;width:30%;background:linear-gradient(90deg,var(--blue),#60a5fa);border-radius:3px;transition:width .5s ease"></div>
      </div>
    </div>`;

  try {
    // /api/book מושך טקסט חי מהמקור
    const d = await fetch(`/api/book/${encodeURIComponent(bid)}`).then(r=>r.json());

    if(d.text && d.text.length > 30){
      renderTextReader(d.text, d.has_improved, bid);
      return;
    }

    // HebrewBooks בלי טקסט → OCR עם Claude Vision
    if(bid.startsWith('hb-')){
      // בדוק אם יש ANTHROPIC_API_KEY
      setOcrStatus('🔍 מפעיל OCR...', 'שולח לClaude Vision לקריאת עברית מהסריקה', 15);
      try{
        const ocrResp = await fetch(`/api/ocr/${encodeURIComponent(bid)}`, {method:'POST'}).then(r=>r.json());
        if(ocrResp.status === 'already_done'){
          // כבר נסו, אין טקסט זמין
          $('vbody').innerHTML=`
            <div style="padding:60px;text-align:center">
              <div style="font-size:48px;margin-bottom:16px">📄</div>
              <div style="font-size:16px;font-weight:600;margin-bottom:8px">ספר זה זמין כ-PDF בלבד</div>
              <div style="font-size:13px;color:var(--text3);margin-bottom:20px">לא ניתן לחלץ טקסט מספר זה</div>
              <button onclick="switchTab('pdf')" style="padding:10px 24px;border-radius:8px;border:none;background:var(--blue);color:#fff;cursor:pointer;font-family:inherit;font-size:14px">📄 פתח PDF</button>
            </div>`;
          return;
        }
      }catch(e){}
      await pollForText(bid);
    } else {
      // מקור אחר בלי טקסט
      $('vbody').innerHTML=`
        <div style="padding:60px;text-align:center">
          <div style="font-size:48px;margin-bottom:16px">📭</div>
          <div style="font-size:16px;font-weight:600;margin-bottom:8px;color:var(--text)">לא נמצא טקסט</div>
          <div style="font-size:13px;color:var(--text3);margin-bottom:20px">הספר לא זמין לקריאה בתוך האתר</div>
          <button onclick="switchTab('pdf')" style="padding:8px 20px;border-radius:8px;border:1.5px solid var(--blue);background:var(--blue-lt);color:var(--blue);cursor:pointer;font-family:inherit;font-size:14px">📄 פתח PDF</button>
        </div>`;
    }
  } catch(e) {
    $('vbody').innerHTML=`<div style="padding:40px;text-align:center;color:var(--red)">שגיאה: ${e.message}</div>`;
  }
}

function setOcrStatus(title, sub, pct){
  $('ocrStatus') && ($('ocrStatus').textContent = title);
  $('ocrSub')    && ($('ocrSub').textContent    = sub);
  $('ocrBar')    && ($('ocrBar').style.width     = pct+'%');
}

async function pollForText(bid){
  const PHASES = [
    [5,  '📄 מוריד PDF...',             'מוריד את הספר מ-HebrewBooks', 15],
    [10, '🖼 ממיר לתמונות...',          'ממיר כל עמוד לתמונה ב-300 DPI', 25],
    [20, '🔬 משפר איכות תמונה...',     'מתקן טשטוש, ניגוד ושיפוע', 40],
    [30, '🔤 מזהה סוג כתב...',          'רש"י / דפוס רגיל / עמודות', 50],
    [45, '📖 מריץ OCR...',              'ממיר תמונה לטקסט עברי', 65],
    [90, '✨ Claude משפר טקסט...',      'מתקן שגיאות ומשחזר מילים', 85],
    [120,'⏳ עוד רגע...',               'מסיים שיפור ושמירה', 95],
  ];

  let phaseIdx = 0;
  let elapsed  = 0;

  const interval = setInterval(async () => {
    elapsed += 3;

    // Update phase status
    while(phaseIdx < PHASES.length - 1 && elapsed >= PHASES[phaseIdx][0]){
      phaseIdx++;
    }
    const [, title, sub, pct] = PHASES[phaseIdx];
    setOcrStatus(title, sub, pct);

    // Check if done
    try {
      const d = await fetch(`/api/book/${encodeURIComponent(bid)}`).then(r=>r.json());
      if(d.text){
        clearInterval(interval);
        setOcrStatus('✅ הושלם!', '', 100);
        await new Promise(r=>setTimeout(r,500));
        renderTextReader(d.text, d.has_improved, bid);
      }
    } catch {}

    // Timeout after 5 minutes
    if(elapsed > 300){
      clearInterval(interval);
      $('vbody').innerHTML=`
        <div style="padding:40px;text-align:center">
          <div style="font-size:40px;margin-bottom:16px">⏱</div>
          <div style="font-size:16px;font-weight:600;margin-bottom:8px">ה-OCR לוקח יותר זמן מהצפוי</div>
          <div style="font-size:13px;color:var(--text3);margin-bottom:20px">הספר יהיה מוכן בקרוב ברקע</div>
          <button onclick="fetchAndShowText('${bid}')" style="padding:8px 20px;border-radius:8px;border:1.5px solid var(--blue);background:var(--blue-lt);color:var(--blue);cursor:pointer;font-family:inherit;font-size:14px">🔄 בדוק שוב</button>
        </div>`;
    }
  }, 3000);
}

function renderTextReader(text, hasImproved, bid){

  hasImproved = hasImproved || false;
  if(!text){
    $('vbody').innerHTML=`
      <div class="treader-toolbar">
        <button class="ocr-trigger" onclick="triggerOCR('${S.bid}',this)">🔍 הפעל OCR לספר זה</button>
        <span style="color:var(--text3);font-size:13px;margin-right:10px">OCR יהפוך את הסריקה לטקסט קריא (~2 דקות)</span>
      </div>
      <div class="treader"><div class="treader-content" style="text-align:center;color:var(--text3);padding-top:60px">
        <div style="font-size:48px;margin-bottom:16px">🔍</div>
        <div style="font-size:16px;margin-bottom:8px">טקסט לא זמין עדיין</div>
        <div style="font-size:13px">לחץ "הפעל OCR" להמרה אוטומטית לטקסט קריא</div>
      </div></div>`;
    return;
  }
  $('vbody').innerHTML=`
    <div class="treader-toolbar">
      <span style="font-size:13px;color:var(--text3)">גודל גופן:</span>
      <button class="fsize-btn" onclick="changeFontSize(-1)">א−</button>
      <button class="fsize-btn" onclick="changeFontSize(1)">א+</button>
      <span style="color:var(--border2)">|</span>
      ${hasImproved
        ? '<span style="font-size:12px;color:var(--green)">✨ שופר ע"י Claude</span>'
        : `<button class="ocr-trigger" onclick="triggerImprove('${bid}',this)">✨ שפר עם Claude AI</button>`
      }
      <span style="color:var(--border2)">|</span>
      <button class="fsize-btn" style="background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600;padding:4px 14px" onclick="exportPDF('${bid}')">📥 הורד PDF מעוצב</button>
      <span style="color:var(--border2)">|</span>
      <span style="font-size:12px;color:var(--green)">✓ טקסט זמין</span>
    </div>
    <div class="treader" id="treader">
      <div class="treader-content" id="treader-content" style="font-size:${S.fs}px">${esc(text).replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>')}</div>
    </div>`;
}

function changeFontSize(delta){

  const el=$('treader-content');

async function exportPDF(bid){
  const btn = event && event.target;
  const orig = btn ? btn.textContent : '';
  if(btn){ btn.textContent='⏳ מייצר PDF...'; btn.disabled=true; }

  try{
    const resp = await fetch(`/api/export-pdf/${encodeURIComponent(bid)}`);
    if(!resp.ok){
      // Fallback: print the text reader
      if(btn){ btn.textContent=orig||'📥 הורד PDF'; btn.disabled=false; }
      window.print();
      return;
    }
    const blob = await resp.blob();
    if(blob.size < 100){
      window.print();
      return;
    }
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href    = url;
    a.download= (S.btitle||'book').replace(/[^א-תa-zA-Z0-9]/g,'_') + '.pdf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
  } catch(e){
    // Always fallback to print
    window.print();
  } finally {
    if(btn){ btn.textContent=orig||'📥 הורד PDF'; btn.disabled=false; }
  }
}

async function triggerImprove(bid, btn){
  if(btn){ btn.textContent='⏳ Claude משפר...'; btn.disabled=true; btn.classList.add('ocr-running'); }
  try{
    await fetch(`/api/improve/${encodeURIComponent(bid)}`,{method:'POST'});
    if(btn){ btn.textContent='✅ מתבצע ברקע!'; setTimeout(()=>{btn.textContent='✨ שפר עם Claude AI';btn.disabled=false;btn.classList.remove('ocr-running');},4000); }
  }catch(e){
    if(btn){ btn.textContent='✗ שגיאה'; btn.disabled=false; }
  }
}

async function triggerOCR(bid, btn){
  if(btn){
    btn.textContent='⏳ מריץ OCR...';
    btn.classList.add('ocr-running');
    btn.disabled=true;
  }
  try{
    const r=await fetch(`/api/ocr/${encodeURIComponent(bid)}`,{method:'POST'}).then(r=>r.json());
    if(btn){
      btn.textContent='✓ OCR התחיל!';
      setTimeout(()=>{btn.textContent='🔍 OCR';btn.classList.remove('ocr-running');btn.disabled=false;},3000);
    }
  }catch(e){
    if(btn){btn.textContent='✗ שגיאה';btn.disabled=false;}
  }
}

// ══ BOOK FLIP VIEWER ════════════════════════════════
const FLIP = {
  pages: [],      // מערך עמודים (מחרוזות טקסט)
  cur: 0,         // עמוד נוכחי
  title: '',
  touchStartX: 0,
  touchStartY: 0,
  animating: false,
};

const CHARS_PER_PAGE = 900; // תווים לעמוד

function splitToPages(text, title){
  // חלק לפסקאות ואז לעמודים
  const paras = text.split(/\n{2,}/).filter(p=>p.trim());
  const pages = [];
  let current = '';

  for(const para of paras){
    if(current.length + para.length > CHARS_PER_PAGE && current.length > 0){
      pages.push(current.trim());
      current = para + '\n\n';
    } else {
      current += para + '\n\n';
    }
  }
  if(current.trim()) pages.push(current.trim());
  return pages.length ? pages : [text.slice(0,CHARS_PER_PAGE)];
}

async function fetchAndShowFlip(bid){
  $('vbody').innerHTML='<div class="loader" style="height:100%"><div class="spin"></div><div style="font-size:14px">טוען ספר לדפדוף...</div></div>';

  try{
    const d = await fetch(`/api/book/${encodeURIComponent(bid)}`).then(r=>r.json());
    if(!d.text || d.text.length < 30){
      if(bid.startsWith('hb-')){
        // הפעל OCR ואז חזור
        await fetch(`/api/ocr/${encodeURIComponent(bid)}`, {method:'POST'});
        $('vbody').innerHTML='<div style="padding:60px;text-align:center"><div style="font-size:36px;margin-bottom:16px">⏳</div><div style="font-size:15px;font-weight:600">OCR מתחיל...</div><div style="font-size:13px;color:var(--text3);margin-top:8px">ה-OCR יארך 2-3 דקות, אחר כך נסה שוב</div><br><button onclick="fetchAndShowFlip(\'' + bid + '\')" style="padding:8px 20px;border-radius:8px;border:1.5px solid var(--blue);background:var(--blue-lt);color:var(--blue);cursor:pointer;font-family:inherit">🔄 נסה שוב</button></div>';
      } else {
        fetchAndShowText(bid);
      }
      return;
    }

    FLIP.pages = splitToPages(d.text, d.title||d.he_title||bid);
    FLIP.cur   = 0;
    FLIP.title = d.title || d.he_title || 'ספר';
    renderFlipPage(0, null);

  } catch(e){
    $('vbody').innerHTML='<div style="padding:40px;text-align:center;color:var(--red)">שגיאה בטעינת ספר: '+e.message+'</div>';
  }
}

function renderFlipPage(pageIdx, direction){
  if(FLIP.animating) return;
  if(pageIdx < 0 || pageIdx >= FLIP.pages.length) return;

  const total   = FLIP.pages.length;
  const pct     = ((pageIdx+1)/total*100).toFixed(1);
  const text    = FLIP.pages[pageIdx];

  const html = `
    <div class="flip-container" id="flipCont"
      ontouchstart="flipTouchStart(event)"
      ontouchend="flipTouchEnd(event)">

      <!-- חץ שמאל = דף הבא (עברית — מימין לשמאל) -->
      <button class="flip-arrow left" onclick="flipPage(1)" ${pageIdx>=total-1?'disabled':''} title="עמוד הבא">›</button>

      <div class="flip-page" id="flipPage">
        <div class="flip-page-header">
          <span class="flip-book-title">${esc(FLIP.title)}</span>
          <span class="flip-page-num">${pageIdx+1} / ${total}</span>
        </div>
        <div class="flip-page-content" id="flipContent">${esc(text).replace(/\n/g,'<br>')}</div>
        <div class="flip-page-footer">
          <div class="flip-dots">
            ${Array.from({length:Math.min(total,9)},(_,i)=>{
              const dotIdx = Math.floor(i * total/Math.min(total,9));
              return `<div class="flip-dot ${Math.abs(dotIdx-pageIdx)<total/9?'active':''}" onclick="flipGoTo(${dotIdx})"></div>`;
            }).join('')}
          </div>
        </div>
      </div>

      <!-- חץ ימין = דף הקודם -->
      <button class="flip-arrow right" onclick="flipPage(-1)" ${pageIdx<=0?'disabled':''} title="עמוד קודם">‹</button>

      <div class="flip-progress">
        <div class="flip-progress-fill" style="width:${pct}%"></div>
      </div>
    </div>`;

  if(!direction){
    $('vbody').innerHTML = html;
    FLIP.cur = pageIdx;
    return;
  }

  // אנימציית דפדוף
  FLIP.animating = true;
  const vbody = $('vbody');
  const oldPage = vbody.querySelector('.flip-page');

  // Animate out
  if(oldPage){
    oldPage.classList.add(direction===1 ? 'leaving-left' : 'leaving-right');
  }

  setTimeout(()=>{
    vbody.innerHTML = html;
    FLIP.cur = pageIdx;
    const newPage = vbody.querySelector('.flip-page');
    if(newPage){
      newPage.classList.add(direction===1 ? 'entering-right' : 'entering-left');
      requestAnimationFrame(()=>{
        requestAnimationFrame(()=>{
          newPage.classList.remove('entering-right','entering-left');
          FLIP.animating = false;
        });
      });
    } else {
      FLIP.animating = false;
    }
  }, 250);
}

function flipPage(dir){
  // dir=1 → הבא, dir=-1 → הקודם
  const next = FLIP.cur + dir;
  if(next < 0 || next >= FLIP.pages.length) return;
  renderFlipPage(next, dir);
}

function flipGoTo(idx){
  const dir = idx > FLIP.cur ? 1 : -1;
  renderFlipPage(idx, dir);
}

// ── Swipe / Touch support ──
function flipTouchStart(e){
  FLIP.touchStartX = e.touches[0].clientX;
  FLIP.touchStartY = e.touches[0].clientY;
}
function flipTouchEnd(e){
  const dx = e.changedTouches[0].clientX - FLIP.touchStartX;
  const dy = e.changedTouches[0].clientY - FLIP.touchStartY;
  if(Math.abs(dx) < Math.abs(dy) || Math.abs(dx) < 40) return;
  // עברית: החלקה שמאלה = הבא, ימינה = קודם
  flipPage(dx < 0 ? 1 : -1);
}

// ── Keyboard ──
document.addEventListener('keydown', e=>{
  if(!$('vov')?.classList.contains('open')) return;
  if(S.tab !== 'flip') return;
  if(e.key==='ArrowLeft')  flipPage(1);
  if(e.key==='ArrowRight') flipPage(-1);
});

function jumpToLine(line){
  // Switch to text tab and scroll to line
  switchTab('text');
  setTimeout(()=>{
    const el = $('treader-content');
    if(!el) return;
    const lines = el.querySelectorAll('p,br');
    if(lines[line]) lines[line].scrollIntoView({behavior:'smooth',block:'center'});
  }, 800);
}

  }catch(e){
    $('vbody').innerHTML=`<div style="padding:40px;text-align:center;color:var(--red)">שגיאה</div>`;
  }

        <button class="ft" id="ft-english" onclick="setFeatTab('english','${bid}','${esc(title).replace(/'/g,"\'")}')">🌍 אנגלית</button>
        <button class="ft" id="ft-fts"     onclick="setFeatTab('fts','${bid}','${esc(title).replace(/'/g,"\'")}')">🔍 חיפוש בכל הספרים</button>

        <div style="margin-bottom:10px;font-size:13px;color:var(--text3)">
          📌 בחר טקסט מהספר (גרור עם העכבר/אצבע) ואז לחץ "📋 הוסף בחירה"
        </div>
        <textarea class="ai-textarea" id="aiPassage" placeholder="הדבק כאן קטע מהספר לפירוש..." dir="rtl"></textarea>

function setFeatTab(tab, bid, title){
  bid   = bid   || S.bid;
  title = title || S.btitle;
  document.querySelectorAll('.ft').forEach(b=>b.classList.remove('on'));
  $('ft-'+tab) && $('ft-'+tab).classList.add('on');

  const body = $('featBody');
  if(tab==='fts'){
    body.innerHTML=`
      <div class="book-search-bar" style="margin-bottom:16px">
        <input id="ftsQ" type="text" placeholder="חפש מילה בכל הספרים..." dir="rtl">
        <button onclick="doFTS()">חפש</button>
      </div>
      <div id="ftsResults"></div>`;
    $('ftsQ').addEventListener('keydown',e=>{if(e.key==='Enter')doFTS();});
    return;
  }

  const labels = {
    explain: {title:'🧠 פירוש', btn:'פרש לי', ph:'הדבק קטע לפירוש...'},
    modern:  {title:'📝 עברית מודרנית', btn:'תרגם', ph:'הדבק קטע לתרגום לעברית מודרנית...'},
    english: {title:'🌍 אנגלית', btn:'Translate', ph:'הדבק קטע לתרגום לאנגלית...'},
  };
  const l = labels[tab];
  body.innerHTML=`
    <div style="margin-bottom:12px;font-size:13px;color:var(--text3)">${l.title}:</div>
    <textarea class="ai-textarea" id="aiPassage" placeholder="${l.ph}" dir="rtl"></textarea>
    <div class="ai-btn-row">
      <button class="ai-btn primary" onclick="runAI('${tab}',bid||S.bid,title||S.btitle)">✨ ${l.btn}</button>
      <button class="ai-btn" onclick="pasteFromBook()" style="background:var(--green-lt);border-color:#a7f3d0;color:var(--green)">📋 הוסף בחירה</button>
    </div>
    <div id="aiResult" class="ai-result" style="display:none"></div>`;
}

async function runAI(action, bid, title){
  const passage = $('aiPassage') ? $('aiPassage').value.trim() : '';
  if(!passage){
    alert('הדבק קטע טקסט מהספר קודם');
    return;
  }
  const res = $('aiResult');
  res.style.display='block';
  res.innerHTML='<div style="display:flex;align-items:center;gap:10px"><div class="spin" style="width:20px;height:20px;border-width:2px"></div>Claude חושב...</div>';

  try{
    let endpoint, body;
    if(action==='explain'){
      endpoint='/api/ai-explain';
      body={text:passage, book:title};
    } else {
      endpoint='/api/ai-translate';
      const targetMap={modern:'modern_hebrew', english:'english'};
      body={text:passage, target:targetMap[action]||'modern_hebrew'};
    }

    const resp = await fetch(endpoint, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });

    if(!resp.ok){
      const txt = await resp.text();
      res.textContent = 'שגיאת שרת: ' + resp.status + ' — ' + txt.slice(0,100);
      return;
    }

    const d = await resp.json();
    if(d.error){
      res.textContent = 'שגיאה: ' + d.error;
      return;
    }
    res.textContent = d.explanation || d.translation || 'לא התקבלה תשובה';
  }catch(e){
    res.textContent = 'שגיאת רשת: ' + e.message;
  }
}

async function doFTS(){
  const q = $('ftsQ').value.trim();
  if(!q) return;
  const res = $('ftsResults');
  res.innerHTML='<div class="loader"><div class="spin"></div></div>';
  try{
    const d = await fetch(`/api/fulltext-search?q=${encodeURIComponent(q)}`).then(r=>r.json());
    if(!d.results.length){
      res.innerHTML=`<div style="text-align:center;color:var(--text3);padding:30px">לא נמצאו תוצאות</div>`;
      return;
    }
    res.innerHTML=`
      <div style="font-size:13px;color:var(--text3);margin-bottom:12px">${d.total} תוצאות</div>
      ${d.results.map(r=>`
        <div class="fts-result" onclick="openBook('${r.book_id}','${esc(r.title).replace(/'/g,"\'")}','${r.source||'hebrewbooks'}','text')">
          <div class="fts-book">${esc(r.title)} ${r.author?'— '+esc(r.author):''}</div>
          <div class="fts-excerpt">${esc(r.excerpt)}</div>
        </div>`).join('')}`;
  }catch(e){
    res.innerHTML=`<div style="color:var(--red)">שגיאה</div>`;
  }
}

function pasteFromBook(){
  const ta = $('aiPassage');
  if(!ta) return;
  // First try selected text from anywhere on page
  const sel = window.getSelection ? window.getSelection().toString().trim() : '';
  if(sel && sel.length > 5){
    ta.value = sel;
    ta.focus();
    return;
  }
  // Then try treader content (first 400 chars)
  const el = $('treader-content');
  if(el){
    ta.value = el.innerText.slice(0, 400).trim();
    ta.focus();
    return;
  }
  // Then flip content
  const fc = $('flipContent');
  if(fc){
    ta.value = fc.innerText.slice(0, 400).trim();
    ta.focus();
  }
}

async function runFTS(){

  try{

      res.innerHTML='<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">לא נמצאו תוצאות</div></div>';

    }
    res.innerHTML=`

        </div>`).join('')}`;
  }catch(e){
    res.innerHTML=`<div style="color:var(--red);padding:20px">שגיאה</div>`;
  }
}
