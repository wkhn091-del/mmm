<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>גנזך — ספרייה יהודית</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Hebrew:wght@300;400;600;700;900&family=Heebo:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   DESIGN SYSTEM
═══════════════════════════════════════════════ */
:root {
  --bg:        #0c0e14;
  --surface:   #13161f;
  --card:      #1a1e2a;
  --card2:     #1f2435;
  --border:    #2a2f42;
  --border2:   #343b54;

  --blue:      #4d7cfe;
  --blue2:     #6b95ff;
  --teal:      #00c9a7;
  --teal2:     #00e6bf;
  --amber:     #f5a623;

  --text:      #e8ecf5;
  --text2:     #a0a9c0;
  --text3:     #606880;

  --red:       #ff4757;
  --green:     #2ed573;

  /* Category colors */
  --c1: #4d7cfe; --c2: #00c9a7; --c3: #f5a623; --c4: #ff6b6b;
  --c5: #a78bfa; --c6: #fb923c; --c7: #34d399; --c8: #f472b6;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Heebo', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── SCROLLBAR ─────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ═══════════════════════════════════════════════
   APP SHELL
═══════════════════════════════════════════════ */
.app {
  display: grid;
  grid-template-columns: 260px 1fr;
  grid-template-rows: 60px 1fr;
  grid-template-areas:
    "sidebar topbar"
    "sidebar main";
  height: 100vh;
}

/* ── TOPBAR ─────────────────────────────────── */
.topbar {
  grid-area: topbar;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 24px;
  position: sticky;
  top: 0;
  z-index: 50;
}

.search-container {
  flex: 1;
  max-width: 560px;
  position: relative;
}

.search-input {
  width: 100%;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'Heebo', sans-serif;
  font-size: 15px;
  padding: 9px 44px 9px 16px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  direction: rtl;
}
.search-input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(77,124,254,0.15);
}
.search-input::placeholder { color: var(--text3); }

.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 16px;
  pointer-events: none;
}

.topbar-stats {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(0,201,167,0.08);
  border: 1px solid rgba(0,201,167,0.2);
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 13px;
  color: var(--teal);
  white-space: nowrap;
}
.stats-num {
  font-weight: 700;
  font-size: 15px;
}

/* ── SIDEBAR ─────────────────────────────────── */
.sidebar {
  grid-area: sidebar;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  position: relative;
}

.logo-area {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
}

.logo {
  font-family: 'Noto Serif Hebrew', serif;
  font-size: 24px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--blue2), var(--teal));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1;
}
.logo-sub {
  font-size: 11px;
  color: var(--text3);
  margin-top: 3px;
  letter-spacing: 1px;
}

.sidebar-section {
  padding: 16px 12px 8px;
}
.sidebar-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 0 8px;
  margin-bottom: 6px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text2);
  transition: all 0.15s;
  border: none;
  background: none;
  width: 100%;
  text-align: right;
}
.nav-item:hover { background: var(--card); color: var(--text); }
.nav-item.active {
  background: rgba(77,124,254,0.12);
  color: var(--blue2);
}

.nav-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.cat-count {
  margin-right: auto;
  font-size: 11px;
  color: var(--text3);
  background: var(--card2);
  padding: 2px 7px;
  border-radius: 20px;
}

/* crawler status */
.crawl-bar {
  margin: 12px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 12px;
}
.crawl-label { color: var(--text3); margin-bottom: 6px; }
.crawl-progress-track {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.crawl-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--blue), var(--teal));
  border-radius: 2px;
  width: 0%;
  transition: width 1s ease;
  animation: shimmer 2s infinite;
}
@keyframes shimmer {
  0%,100% { opacity: 1; }
  50% { opacity: 0.6; }
}

/* ── MAIN ─────────────────────────────────────── */
.main {
  grid-area: main;
  overflow-y: auto;
  padding: 28px 32px;
}

/* ── PAGE HEADER ───────────────────────────────── */
.page-header {
  margin-bottom: 28px;
}
.page-title {
  font-family: 'Noto Serif Hebrew', serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
}
.page-subtitle {
  font-size: 14px;
  color: var(--text3);
  margin-top: 4px;
}

/* ── CATEGORY CHIPS ────────────────────────────── */
.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 24px;
}
.chip {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
  border: 1.5px solid var(--border);
  color: var(--text2);
  background: var(--card);
  transition: all 0.15s;
  white-space: nowrap;
}
.chip:hover { border-color: var(--blue); color: var(--blue2); }
.chip.active {
  background: rgba(77,124,254,0.15);
  border-color: var(--blue);
  color: var(--blue2);
}

/* ── BOOK GRID ─────────────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
  gap: 16px;
  margin-bottom: 40px;
}

.book-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.2s ease;
  animation: fadeUp 0.4s ease both;
}
.book-card:hover {
  border-color: var(--blue);
  transform: translateY(-3px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.4), 0 0 0 1px rgba(77,124,254,0.3);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.book-spine {
  height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.book-spine::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0.2) 100%);
}
.book-spine-text {
  font-family: 'Noto Serif Hebrew', serif;
  font-size: 36px;
  opacity: 0.25;
  z-index: 1;
}

.book-body { padding: 12px; }
.book-title {
  font-family: 'Noto Serif Hebrew', serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.35;
  margin-bottom: 4px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.book-author {
  font-size: 12px;
  color: var(--text3);
  margin-bottom: 10px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.book-btn {
  width: 100%;
  padding: 7px;
  border-radius: 7px;
  border: 1px solid var(--border2);
  background: var(--card2);
  color: var(--text2);
  font-family: 'Heebo', sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.book-btn:hover {
  background: rgba(77,124,254,0.15);
  border-color: var(--blue);
  color: var(--blue2);
}

/* ── PAGINATION ────────────────────────────────── */
.pagination {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;
  padding: 20px 0;
}
.pg-btn {
  min-width: 36px; height: 36px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text2);
  font-family: 'Heebo', sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 8px;
}
.pg-btn:hover { border-color: var(--blue); color: var(--blue2); }
.pg-btn.active {
  background: var(--blue);
  border-color: var(--blue);
  color: #fff;
  font-weight: 600;
}
.pg-btn:disabled { opacity: 0.4; cursor: default; }

/* ── LOADING ─────────────────────────────────────── */
.loader {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 20px;
  gap: 16px;
  color: var(--text3);
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── VIEWER ──────────────────────────────────────── */
.viewer {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  backdrop-filter: blur(12px);
  z-index: 200;
  display: none;
  flex-direction: column;
}
.viewer.open { display: flex; }

.viewer-header {
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 20px;
  flex-shrink: 0;
}
.viewer-title {
  flex: 1;
  font-family: 'Noto Serif Hebrew', serif;
  font-size: 17px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.vbtn {
  height: 34px;
  padding: 0 14px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text2);
  font-family: 'Heebo', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.vbtn:hover { border-color: var(--blue); color: var(--blue2); }
.vbtn.danger { border-color: rgba(255,71,87,0.3); color: var(--red); }
.vbtn.danger:hover { background: rgba(255,71,87,0.1); }

.viewer-body { flex: 1; overflow: hidden; }
.viewer-body iframe { width: 100%; height: 100%; border: none; }

/* ── EMPTY STATE ─────────────────────────────────── */
.empty {
  text-align: center;
  padding: 80px 20px;
  color: var(--text3);
}
.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
.empty-title { font-size: 18px; color: var(--text2); margin-bottom: 8px; }

/* ── MOBILE ──────────────────────────────────────── */
@media (max-width: 768px) {
  .app {
    grid-template-columns: 1fr;
    grid-template-rows: 56px auto 1fr;
    grid-template-areas: "topbar" "sidebar" "main";
  }
  .sidebar {
    border-left: none;
    border-bottom: 1px solid var(--border);
    flex-direction: row;
    overflow-x: auto;
    overflow-y: hidden;
    height: auto;
    min-height: 0;
  }
  .logo-area, .crawl-bar { display: none; }
  .sidebar-section { padding: 8px 6px; white-space: nowrap; }
  .sidebar-label { display: none; }
  .nav-item { padding: 7px 10px; font-size: 13px; }
  .main { padding: 16px; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 12px; }
}

/* stagger cards */
.book-card:nth-child(n+1)  { animation-delay: calc(0.04s * (var(--i,0))); }
</style>
</head>
<body>

<div class="app">

  <!-- ── SIDEBAR ────────────────────────────────── -->
  <aside class="sidebar">
    <div class="logo-area">
      <div class="logo">גנזך</div>
      <div class="logo-sub">ספרייה יהודית דיגיטלית</div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">ניווט</div>
      <button class="nav-item active" onclick="setView('home')" id="nav-home">
        <span>🏠</span> ספריה ראשית
      </button>
      <button class="nav-item" onclick="setView('search')" id="nav-search">
        <span>🔍</span> חיפוש מתקדם
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">קטגוריות</div>
      <div id="catNav"></div>
    </div>

    <div class="crawl-bar" id="crawlBar">
      <div class="crawl-label">🕷️ אינדוקס: <span id="crawlCount">0</span> ספרים</div>
      <div class="crawl-progress-track">
        <div class="crawl-progress-fill" id="crawlFill"></div>
      </div>
    </div>
  </aside>

  <!-- ── TOPBAR ──────────────────────────────────── -->
  <header class="topbar">
    <div class="search-container">
      <span class="search-icon">🔍</span>
      <input
        class="search-input"
        id="searchInput"
        type="text"
        placeholder="חפש ספר, מחבר, נושא..."
        autocomplete="off"
      />
    </div>
    <div class="topbar-stats">
      <span class="stats-num" id="totalBooks">…</span>
      <span>ספרים</span>
    </div>
  </header>

  <!-- ── MAIN ───────────────────────────────────── -->
  <main class="main" id="main">
    <div class="loader"><div class="spinner"></div>טוען ספרייה...</div>
  </main>
</div>

<!-- ── PDF VIEWER ─────────────────────────────────── -->
<div class="viewer" id="viewer">
  <div class="viewer-header">
    <div class="viewer-title" id="viewerTitle">טוען...</div>
    <button class="vbtn" onclick="downloadBook()">⬇ הורד</button>
    <button class="vbtn" onclick="openInNew()">↗ פתח בחלון חדש</button>
    <button class="vbtn danger" onclick="closeViewer()">✕ סגור</button>
  </div>
  <div class="viewer-body">
    <iframe id="pdfFrame" src=""></iframe>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════
let state = {
  view: 'home',
  query: '',
  subject: '',
  page: 1,
  totalBooks: 0,
  currentBookId: null,
  currentBookTitle: '',
  subjects: [],
};

const SPINE_COLORS = [
  ['#1e3a5f','#2d5a9e'],['#1a3a2a','#2a6040'],['#3a1a1a','#6b2d2d'],
  ['#2a1a3a','#5b3d7a'],['#1a2a3a','#2d5a6b'],['#3a2a10','#7a5a20'],
  ['#1a1a3a','#2d2d7a'],['#2a3a1a','#4a7a2a'],['#3a1a2a','#7a2d5a'],
  ['#1a3a3a','#2a7a6b'],
];
const SPINE_ICONS = ['📜','📖','✡','🕎','📚','🔯','🕍','📿','🗂','🕰'];

// ══════════════════════════════════════════════════
//  API
// ══════════════════════════════════════════════════
async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ══════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════
function renderCard(book, idx) {
  const [bg1, bg2] = SPINE_COLORS[book.id % SPINE_COLORS.length];
  const icon = SPINE_ICONS[book.id % SPINE_ICONS.length];
  const safeTitle  = esc(book.title  || '');
  const safeAuthor = esc(book.author || '');
  return `
  <div class="book-card" style="--i:${idx}" onclick="openBook(${book.id},'${safeTitle.replace(/'/g,"\\'")}')">
    <div class="book-spine" style="background:linear-gradient(135deg,${bg1},${bg2})">
      <div class="book-spine-text">${icon}</div>
    </div>
    <div class="book-body">
      <div class="book-title">${safeTitle}</div>
      <div class="book-author">${safeAuthor}</div>
      <button class="book-btn">📖 קרא עכשיו</button>
    </div>
  </div>`;
}

function renderGrid(books, total, pages, page) {
  if (!books.length) {
    return `<div class="empty">
      <div class="empty-icon">📭</div>
      <div class="empty-title">לא נמצאו ספרים</div>
      <div>נסה מילות חיפוש שונות</div>
    </div>`;
  }

  const grid = `<div class="grid">${books.map(renderCard).join('')}</div>`;
  const pagination = renderPagination(page, pages);
  return grid + pagination;
}

function renderPagination(current, total) {
  if (total <= 1) return '';

  let btns = '';
  btns += `<button class="pg-btn" onclick="goPage(${current-1})" ${current<=1?'disabled':''}>‹</button>`;

  const start = Math.max(1, current - 3);
  const end   = Math.min(total, current + 3);

  if (start > 1) btns += `<button class="pg-btn" onclick="goPage(1)">1</button><span style="color:var(--text3);padding:0 4px">…</span>`;
  for (let i = start; i <= end; i++) {
    btns += `<button class="pg-btn ${i===current?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  if (end < total) btns += `<span style="color:var(--text3);padding:0 4px">…</span><button class="pg-btn" onclick="goPage(${total})">${total}</button>`;

  btns += `<button class="pg-btn" onclick="goPage(${current+1})" ${current>=total?'disabled':''}>›</button>`;

  return `<div class="pagination">${btns}</div>`;
}

// ══════════════════════════════════════════════════
//  VIEWS
// ══════════════════════════════════════════════════
const $main = () => document.getElementById('main');

function showLoader() {
  $main().innerHTML = '<div class="loader"><div class="spinner"></div>טוען...</div>';
}

async function loadHome() {
  showLoader();
  try {
    const d = await api('/api/featured');
    const header = `
      <div class="page-header">
        <div class="page-title">ספרים מומלצים</div>
        <div class="page-subtitle">אוסף ספרי היסוד של הספרייה היהודית</div>
      </div>`;
    $main().innerHTML = header + renderGrid(d.books, d.books.length, 1, 1);
  } catch(e) {
    $main().innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">שגיאת חיבור לשרת</div></div>`;
  }
}

async function loadSearch() {
  showLoader();
  const params = new URLSearchParams({
    q: state.query,
    page: state.page,
    subject: state.subject,
  });
  try {
    const d = await api(`/api/search?${params}`);
    const title  = state.query ? `תוצאות: "${state.query}"` : (state.subject || 'כל הספרים');
    const header = `
      <div class="page-header">
        <div class="page-title">${esc(title)}</div>
        <div class="page-subtitle">${d.total.toLocaleString()} ספרים נמצאו</div>
      </div>
      ${renderChips()}`;
    $main().innerHTML = header + renderGrid(d.books, d.total, d.pages, d.page);
    $main().scrollTo(0,0);
  } catch(e) {
    $main().innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">שגיאת חיפוש</div></div>`;
  }
}

function renderChips() {
  const subjects = state.subjects.slice(0, 12);
  if (!subjects.length) return '';
  const all = `<div class="chip ${!state.subject?'active':''}" onclick="filterSubject('')">הכל</div>`;
  const chips = subjects.map(s =>
    `<div class="chip ${state.subject===s.name?'active':''}" onclick="filterSubject('${esc(s.name)}')">${esc(s.name)} <span style="opacity:.5">${s.count}</span></div>`
  ).join('');
  return `<div class="chips">${all}${chips}</div>`;
}

// ══════════════════════════════════════════════════
//  ACTIONS
// ══════════════════════════════════════════════════
function setView(v) {
  state.view = v;
  state.page = 1;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('nav-' + v);
  if (el) el.classList.add('active');

  if (v === 'home') loadHome();
  else loadSearch();
}

function goPage(p) {
  state.page = p;
  loadSearch();
}

function filterSubject(s) {
  state.subject = s;
  state.page    = 1;
  loadSearch();
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  state.query   = q;
  state.page    = 1;
  state.view    = 'search';
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  loadSearch();
}

// ══════════════════════════════════════════════════
//  VIEWER
// ══════════════════════════════════════════════════
function openBook(id, title) {
  state.currentBookId    = id;
  state.currentBookTitle = title;
  document.getElementById('viewerTitle').textContent = title;
  document.getElementById('pdfFrame').src = `/api/pdf/${id}`;
  document.getElementById('viewer').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeViewer() {
  document.getElementById('viewer').classList.remove('open');
  document.getElementById('pdfFrame').src = '';
  document.body.style.overflow = '';
}

function downloadBook() {
  if (!state.currentBookId) return;
  const a = document.createElement('a');
  a.href = `/api/pdf/${state.currentBookId}`;
  a.download = `book_${state.currentBookId}.pdf`;
  a.click();
}

function openInNew() {
  if (!state.currentBookId) return;
  window.open(`https://hebrewbooks.org/pdfpager.aspx?req=${state.currentBookId}`, '_blank');
}

// ══════════════════════════════════════════════════
//  SIDEBAR CATEGORIES
// ══════════════════════════════════════════════════
function buildCatNav(subjects) {
  const colors = ['var(--c1)','var(--c2)','var(--c3)','var(--c4)','var(--c5)','var(--c6)','var(--c7)','var(--c8)'];
  const nav = document.getElementById('catNav');
  nav.innerHTML = subjects.slice(0, 14).map((s, i) => `
    <button class="nav-item" onclick="filterSubject('${esc(s.name)}');setActiveCat(this)">
      <span class="nav-dot" style="background:${colors[i%colors.length]}"></span>
      ${esc(s.name)}
      <span class="cat-count">${s.count}</span>
    </button>
  `).join('');
}

function setActiveCat(el) {
  document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
}

// ══════════════════════════════════════════════════
//  STATS POLLING
// ══════════════════════════════════════════════════
async function refreshStats() {
  try {
    const d = await api('/api/stats');
    state.totalBooks = d.total;
    state.subjects   = d.subjects;

    document.getElementById('totalBooks').textContent = d.total.toLocaleString();
    document.getElementById('crawlCount').textContent = d.total.toLocaleString();

    // progress bar (target 100k)
    const pct = Math.min(100, (d.total / 100000) * 100);
    document.getElementById('crawlFill').style.width = pct + '%';

    buildCatNav(d.subjects);
  } catch {}
}

// ══════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

// Debounced live search
let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (q.length >= 2) {
    searchTimer = setTimeout(() => {
      state.query = q;
      state.page  = 1;
      state.view  = 'search';
      loadSearch();
    }, 450);
  }
});

// ESC closes viewer
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeViewer();
});

// Boot
refreshStats();
setInterval(refreshStats, 8000);
loadHome();
</script>
</body>
</html>
