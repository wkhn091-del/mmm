<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>גנזך • ספרייה יהודית</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Hebrew:wght@400;600;700;900&family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════ TOKENS ═══════ */
:root{
  --white:     #ffffff;
  --bg:        #f5f6fa;
  --bg2:       #eef0f7;
  --surface:   #ffffff;
  --border:    #e2e5ef;
  --border2:   #d0d4e8;

  --blue:      #2563eb;
  --blue-lt:   #eff6ff;
  --blue-mid:  #3b82f6;
  --indigo:    #4f46e5;

  --text:      #111827;
  --text2:     #374151;
  --text3:     #6b7280;
  --text4:     #9ca3af;

  --green:     #059669;
  --green-lt:  #ecfdf5;
  --amber:     #d97706;
  --amber-lt:  #fffbeb;
  --red:       #dc2626;

  --radius:    10px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow:    0 4px 12px rgba(0,0,0,.08);
  --shadow-lg: 0 8px 30px rgba(0,0,0,.12);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Heebo',sans-serif;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ═══════ LAYOUT ═══════ */
.shell{display:grid;grid-template-columns:240px 1fr;grid-template-rows:64px 1fr;grid-template-areas:"nav top""nav main";height:100vh}

/* ═══════ NAV ═══════ */
nav{
  grid-area:nav;
  background:var(--surface);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow-y:auto;
}
.nav-logo{
  padding:20px 18px 16px;
  border-bottom:1px solid var(--border);
}
.logo-mark{
  font-family:'Noto Serif Hebrew',serif;
  font-size:22px;font-weight:900;
  color:var(--blue);
  line-height:1;
}
.logo-tagline{font-size:11px;color:var(--text4);margin-top:3px;letter-spacing:.5px}

.nav-section{padding:14px 10px 6px}
.nav-section-label{
  font-size:10px;font-weight:700;letter-spacing:1.5px;
  color:var(--text4);text-transform:uppercase;
  padding:0 8px;margin-bottom:4px
}

.nav-btn{
  display:flex;align-items:center;gap:9px;
  width:100%;padding:8px 12px;
  border:none;background:none;
  border-radius:8px;
  font-family:'Heebo',sans-serif;font-size:14px;
  color:var(--text2);cursor:pointer;
  text-align:right;
  transition:all .15s;
}
.nav-btn:hover{background:var(--bg);color:var(--text)}
.nav-btn.active{background:var(--blue-lt);color:var(--blue);font-weight:600}
.nav-btn .icon{font-size:16px;flex-shrink:0}
.nav-btn .badge{
  margin-right:auto;
  background:var(--bg2);
  color:var(--text3);
  font-size:11px;
  padding:1px 7px;border-radius:20px;
}
.nav-btn.active .badge{background:rgba(37,99,235,.1);color:var(--blue)}

.nav-divider{height:1px;background:var(--border);margin:8px 14px}

/* crawl status */
.crawl-box{
  margin:10px;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px;
  margin-top:auto;
}
.crawl-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.crawl-label{font-size:12px;color:var(--text3)}
.crawl-count{font-size:13px;font-weight:700;color:var(--blue)}
.crawl-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.crawl-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--blue),#60a5fa);
  border-radius:3px;
  transition:width 1.5s ease;
}
.crawl-sub{font-size:11px;color:var(--text4);margin-top:5px}

/* ═══════ TOPBAR ═══════ */
header{
  grid-area:top;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:14px;
  padding:0 24px;
  box-shadow:var(--shadow-sm);
  position:sticky;top:0;z-index:40;
}

.search-wrap{flex:1;max-width:520px;position:relative}
.search-wrap input{
  width:100%;
  background:var(--bg);
  border:1.5px solid var(--border);
  border-radius:10px;
  font-family:'Heebo',sans-serif;font-size:14px;
  color:var(--text);
  padding:9px 40px 9px 14px;
  outline:none;
  transition:border-color .2s,box-shadow .2s;
  direction:rtl;
}
.search-wrap input:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(37,99,235,.1);
  background:var(--white);
}
.search-wrap input::placeholder{color:var(--text4)}
.search-icon{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  color:var(--text4);font-size:15px;pointer-events:none
}

.top-chip{
  display:flex;align-items:center;gap:6px;
  background:var(--green-lt);
  border:1px solid #a7f3d0;
  border-radius:8px;
  padding:6px 13px;
  font-size:13px;color:var(--green);
  white-space:nowrap;
  font-weight:600;
}

/* ═══════ MAIN ═══════ */
main{grid-area:main;overflow-y:auto;padding:28px 28px 60px}

/* ═══════ PAGE HEADER ═══════ */
.pg-head{margin-bottom:22px}
.pg-title{font-family:'Noto Serif Hebrew',serif;font-size:22px;font-weight:700;color:var(--text)}
.pg-sub{font-size:13px;color:var(--text3);margin-top:3px}

/* ═══════ FILTER CHIPS ═══════ */
.filter-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px}
.fc{
  padding:5px 13px;
  border-radius:20px;
  border:1.5px solid var(--border);
  background:var(--white);
  font-family:'Heebo',sans-serif;font-size:13px;
  color:var(--text3);cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.fc:hover{border-color:var(--blue-mid);color:var(--blue)}
.fc.on{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600}

/* ═══════ GRID ═══════ */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(175px,1fr));
  gap:16px;
  margin-bottom:32px;
}

/* book colors by category */
.bc-הלכה     {--sp:#2563eb;--sp2:#bfdbfe}
.bc-מוסר     {--sp:#059669;--sp2:#a7f3d0}
.bc-חסידות   {--sp:#7c3aed;--sp2:#ddd6fe}
.bc-פרשנות   {--sp:#d97706;--sp2:#fde68a}
.bc-קבלה     {--sp:#be185d;--sp2:#fbcfe8}
.bc-שו׳ת     {--sp:#0891b2;--sp2:#a5f3fc}
.bc-מחשבה    {--sp:#4f46e5;--sp2:#c7d2fe}
.bc-פילוסופיה{--sp:#065f46;--sp2:#6ee7b7}
.bc-תנ׳ך     {--sp:#92400e;--sp2:#fcd34d}
.bc-אגדה     {--sp:#1d4ed8;--sp2:#93c5fd}
.bc-מועדים   {--sp:#b45309;--sp2:#fde68a}
.bc-שבת      {--sp:#0f766e;--sp2:#99f6e4}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  cursor:pointer;
  transition:all .2s ease;
  animation:rise .35s ease both;
}
.card:hover{
  border-color:var(--blue-mid);
  box-shadow:var(--shadow);
  transform:translateY(-2px);
}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

.card-spine{
  height:108px;
  position:relative;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--sp,#2563eb) 0%,color-mix(in srgb,var(--sp,#2563eb) 70%,#000) 100%);
  overflow:hidden;
}
.card-spine::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.12) 0%,rgba(255,255,255,0) 60%);
}
.card-spine-letter{
  font-family:'Noto Serif Hebrew',serif;
  font-size:44px;font-weight:900;
  color:rgba(255,255,255,.18);
  z-index:1;user-select:none;
}
.card-cat-tag{
  position:absolute;bottom:8px;right:8px;
  background:rgba(255,255,255,.15);
  backdrop-filter:blur(4px);
  border:1px solid rgba(255,255,255,.2);
  border-radius:20px;
  font-size:10px;color:rgba(255,255,255,.9);
  padding:2px 8px;font-weight:500;
}

.card-body{padding:12px 12px 10px}
.card-title{
  font-family:'Noto Serif Hebrew',serif;
  font-size:14px;font-weight:700;
  color:var(--text);line-height:1.4;
  margin-bottom:3px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.card-author{
  font-size:12px;color:var(--text3);
  margin-bottom:10px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.card-btn{
  width:100%;
  padding:7px;
  border-radius:7px;
  border:1.5px solid var(--border);
  background:transparent;
  color:var(--blue);
  font-family:'Heebo',sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;
  transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.card-btn:hover{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ═══════ PAGINATION ═══════ */
.pager{display:flex;justify-content:center;align-items:center;gap:5px;padding:16px 0 8px}
.pb{
  min-width:34px;height:34px;
  border-radius:8px;
  border:1.5px solid var(--border);
  background:var(--white);
  color:var(--text2);
  font-family:'Heebo',sans-serif;font-size:13px;
  cursor:pointer;transition:all .15s;
  display:flex;align-items:center;justify-content:center;
  padding:0 8px;
}
.pb:hover:not(:disabled){border-color:var(--blue-mid);color:var(--blue);background:var(--blue-lt)}
.pb.on{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:700}
.pb:disabled{opacity:.3;cursor:default}

/* ═══════ LOADER ═══════ */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:14px;color:var(--text3)}
.spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

/* ═══════ EMPTY ═══════ */
.empty{text-align:center;padding:80px 20px}
.empty svg{margin-bottom:14px;opacity:.25}
.empty-title{font-size:17px;color:var(--text2);font-weight:600;margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--text3)}

/* ═══════ VIEWER OVERLAY ═══════ */
.viewer{
  position:fixed;inset:0;
  background:rgba(15,20,40,.6);
  backdrop-filter:blur(6px);
  z-index:200;
  display:none;flex-direction:column;
  animation:fadeIn .2s ease;
}
.viewer.open{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.viewer-shell{
  margin:auto;
  width:min(1100px,96vw);
  height:90vh;
  background:var(--surface);
  border-radius:16px;
  border:1px solid var(--border);
  box-shadow:var(--shadow-lg);
  display:flex;flex-direction:column;
  overflow:hidden;
}

.viewer-bar{
  display:flex;align-items:center;gap:10px;
  padding:12px 18px;
  border-bottom:1px solid var(--border);
  background:var(--bg);
  flex-shrink:0;
}
.viewer-bar-title{
  flex:1;
  font-family:'Noto Serif Hebrew',serif;
  font-size:16px;font-weight:700;
  color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

.vb{
  height:32px;padding:0 13px;
  border-radius:7px;
  border:1.5px solid var(--border);
  background:var(--white);
  color:var(--text2);
  font-family:'Heebo',sans-serif;font-size:13px;
  cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:5px;
  white-space:nowrap;
}
.vb:hover{border-color:var(--blue-mid);color:var(--blue);background:var(--blue-lt)}
.vb.close{border-color:transparent;color:var(--text3)}
.vb.close:hover{background:#fee2e2;color:var(--red);border-color:#fca5a5}

.viewer-frame{flex:1;overflow:hidden}
.viewer-frame iframe{width:100%;height:100%;border:none}

/* ═══════ MOBILE ═══════ */
@media(max-width:720px){
  .shell{grid-template-columns:1fr;grid-template-rows:56px 1fr;grid-template-areas:"top""main"}
  nav{display:none}
  main{padding:16px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px}
  .viewer-shell{width:100%;height:100%;border-radius:0}
}
</style>
</head>
<body>
<div class="shell">

<!-- ══ NAV ═══════════════════════════════════════ -->
<nav id="nav">
  <div class="nav-logo">
    <div class="logo-mark">גנזך</div>
    <div class="logo-tagline">ספרייה יהודית דיגיטלית</div>
  </div>

  <div class="nav-section">
    <div class="nav-section-label">ניווט</div>
    <button class="nav-btn active" id="nb-home" onclick="goHome()">
      <span class="icon">🏠</span> ספרייה ראשית
    </button>
    <button class="nav-btn" id="nb-all" onclick="goAll()">
      <span class="icon">📚</span> כל הספרים
    </button>
  </div>

  <div class="nav-divider"></div>

  <div class="nav-section">
    <div class="nav-section-label">קטגוריות</div>
    <div id="catList">
      <div class="loader" style="padding:20px"><div class="spin"></div></div>
    </div>
  </div>

  <div class="crawl-box">
    <div class="crawl-header">
      <span class="crawl-label">🕷 ספרים נסרקו</span>
      <span class="crawl-count" id="crawlNum">0</span>
    </div>
    <div class="crawl-track"><div class="crawl-fill" id="crawlBar"></div></div>
    <div class="crawl-sub">יעד: 100,000 ספרים</div>
  </div>
</nav>

<!-- ══ TOPBAR ════════════════════════════════════ -->
<header>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="q" type="text" placeholder="חפש ספר, מחבר, נושא..." autocomplete="off">
  </div>
  <div class="top-chip">
    <span>📚</span>
    <span id="totalNum">…</span>
    <span>ספרים</span>
  </div>
</header>

<!-- ══ MAIN ══════════════════════════════════════ -->
<main id="main">
  <div class="loader"><div class="spin"></div>טוען ספרייה...</div>
</main>

</div>

<!-- ══ VIEWER ════════════════════════════════════ -->
<div class="viewer" id="viewer">
  <div class="viewer-shell">
    <div class="viewer-bar">
      <div class="viewer-bar-title" id="vTitle">טוען ספר...</div>
      <button class="vb" onclick="dlBook()">⬇ הורד PDF</button>
      <button class="vb" onclick="newTab()">↗ חלון חדש</button>
      <button class="vb close" onclick="closeV()">✕</button>
    </div>
    <div class="viewer-frame">
      <iframe id="frame" src="" allowfullscreen></iframe>
    </div>
  </div>
</div>

<script>
// ══ STATE ══════════════════════════════════════════
const S = {q:'', subject:'', page:1, bid:null, mode:'home'};

// ══ HELPERS ════════════════════════════════════════
const $  = id => document.getElementById(id);
const esc = s  => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// category → spine color class
const CATCLS = {
  'הלכה':'bc-הלכה','מוסר':'bc-מוסר','חסידות':'bc-חסידות',
  'פרשנות':'bc-פרשנות','קבלה':'bc-קבלה','שו"ת':'bc-שו׳ת',
  'מחשבה':'bc-מחשבה','פילוסופיה':'bc-פילוסופיה','תנ"ך':'bc-תנ׳ך',
  'אגדה':'bc-אגדה','מועדים':'bc-מועדים','שבת':'bc-שבת',
};

const CAT_ICONS = {
  'הלכה':'⚖️','מוסר':'🌱','חסידות':'✨','פרשנות':'📖',
  'קבלה':'🔯','שו"ת':'📝','מחשבה':'🧠','פילוסופיה':'💡',
  'תנ"ך':'📜','אגדה':'🕯','מועדים':'🎊','שבת':'🕍',
};

function spineChar(title) {
  const heb = (title||'').match(/[\u05D0-\u05EA]/);
  return heb ? heb[0] : 'ס';
}

// ══ RENDER CARD ════════════════════════════════════
function renderCard(b, i) {
  const cc   = CATCLS[b.subject] || '';
  const ch   = spineChar(b.title);
  const tag  = b.subject ? `<div class="card-cat-tag">${esc(b.subject)}</div>` : '';
  const auth = b.author ? `<div class="card-author">${esc(b.author)}</div>` : '<div class="card-author" style="height:16px"></div>';
  return `
  <div class="card ${cc}" style="animation-delay:${i*.03}s" onclick="openBook(${b.id},'${esc(b.title).replace(/'/g,"\\'")}','${esc(b.subject||'')}')">
    <div class="card-spine">
      <div class="card-spine-letter">${ch}</div>
      ${tag}
    </div>
    <div class="card-body">
      <div class="card-title">${esc(b.title)}</div>
      ${auth}
      <button class="card-btn">📖 קרא עכשיו</button>
    </div>
  </div>`;
}

// ══ RENDER PAGE ════════════════════════════════════
function renderBooks(data) {
  const {books, total, page, pages} = data;
  if (!books.length) {
    $('main').innerHTML = `
      <div class="empty">
        <div style="font-size:56px;margin-bottom:12px;opacity:.2">📭</div>
        <div class="empty-title">לא נמצאו ספרים</div>
        <div class="empty-sub">נסה מילת חיפוש אחרת</div>
      </div>`;
    return;
  }

  // filter chips
  let chips = '';
  if (S.mode==='search' || S.subject) {
    chips = renderChips();
  }

  const grid = `<div class="grid">${books.map(renderCard).join('')}</div>`;
  const pager = pages>1 ? renderPager(page, pages) : '';
  const note  = total > 0
    ? `<div class="pg-sub">${total.toLocaleString()} ספרים נמצאו</div>`
    : '';

  $('main').innerHTML = `
    <div class="pg-head">
      <div class="pg-title">${pageTitle()}</div>
      ${note}
    </div>
    ${chips}${grid}${pager}`;
  $('main').scrollTop = 0;
}

function pageTitle() {
  if (S.mode==='home') return 'ספרים מומלצים';
  if (S.subject) return S.subject;
  if (S.q) return `תוצאות: "${S.q}"`;
  return 'כל הספרים';
}

// ══ FILTER CHIPS ═══════════════════════════════════
let _subjects = [];
function renderChips() {
  if (!_subjects.length) return '';
  const all  = `<div class="fc ${!S.subject?'on':''}" onclick="filterSubj('')">הכל</div>`;
  const rest = _subjects.map(s =>
    `<div class="fc ${S.subject===s.name?'on':''}" onclick="filterSubj('${esc(s.name)}')">${esc(s.name)}</div>`
  ).join('');
  return `<div class="filter-row">${all}${rest}</div>`;
}

function filterSubj(s) {
  S.subject=s; S.page=1;
  if (s) { S.mode='subj'; loadSearch(); }
  else   { S.mode='all';  loadSearch(); }
}

// ══ PAGINATION ═════════════════════════════════════
function renderPager(cur, tot) {
  let h = '';
  h += `<button class="pb" onclick="goPage(${cur-1})" ${cur<=1?'disabled':''}>‹</button>`;
  const s=Math.max(1,cur-2), e=Math.min(tot,cur+2);
  if(s>1) h+=`<button class="pb" onclick="goPage(1)">1</button>${s>2?'<span style="padding:0 4px;color:var(--text4)">…</span>':''}`;
  for(let i=s;i<=e;i++) h+=`<button class="pb ${i===cur?'on':''}" onclick="goPage(${i})">${i}</button>`;
  if(e<tot) h+=`${e<tot-1?'<span style="padding:0 4px;color:var(--text4)">…</span>':''}<button class="pb" onclick="goPage(${tot})">${tot}</button>`;
  h += `<button class="pb" onclick="goPage(${cur+1})" ${cur>=tot?'disabled':''}>›</button>`;
  return `<div class="pager">${h}</div>`;
}

function goPage(p) { S.page=p; loadSearch(); }

// ══ VIEWS ══════════════════════════════════════════
function showLoader() {
  $('main').innerHTML = '<div class="loader"><div class="spin"></div>טוען...</div>';
}

async function goHome() {
  S.mode='home'; S.q=''; S.subject=''; S.page=1;
  setNavActive('nb-home');
  showLoader();
  const d = await fetch('/api/featured').then(r=>r.json());
  renderBooks({books:d.books, total:d.books.length, page:1, pages:1});
}

async function goAll() {
  S.mode='all'; S.q=''; S.subject=''; S.page=1;
  setNavActive('nb-all');
  showLoader();
  await loadSearch();
}

async function loadSearch() {
  showLoader();
  const p = new URLSearchParams({q:S.q, page:S.page, subject:S.subject});
  const d = await fetch(`/api/search?${p}`).then(r=>r.json());
  renderBooks(d);
}

function setNavActive(id) {
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  $(id) && $(id).classList.add('active');
}

// ══ SIDEBAR CATS ═══════════════════════════════════
function buildCatList(subjects) {
  if (!subjects.length) { $('catList').innerHTML=''; return; }
  $('catList').innerHTML = subjects.map(s => {
    const ic = CAT_ICONS[s.name] || '📂';
    return `
    <button class="nav-btn ${S.subject===s.name?'active':''}" id="cat-${esc(s.name)}" onclick="clickCat('${esc(s.name)}')">
      <span class="icon">${ic}</span>
      ${esc(s.name)}
      <span class="badge">${s.count}</span>
    </button>`;
  }).join('');
}

function clickCat(name) {
  S.subject=name; S.mode='subj'; S.page=1; S.q='';
  $('q').value='';
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  $(`cat-${name}`) && $(`cat-${name}`).classList.add('active');
  loadSearch();
}

// ══ STATS ══════════════════════════════════════════
async function refreshStats() {
  try {
    const d = await fetch('/api/stats').then(r=>r.json());
    $('totalNum').textContent = d.total.toLocaleString();
    $('crawlNum').textContent = d.total.toLocaleString();
    $('crawlBar').style.width = Math.min(100, d.total/1000) + '%';
    _subjects = d.subjects;
    buildCatList(d.subjects);
  } catch {}
}

// ══ VIEWER ════════════════════════════════════════
function openBook(id, title, subj) {
  S.bid = id; S._title = title;
  $('vTitle').textContent = title;
  // Use HebrewBooks' own viewer — full book, all pages, proper zoom
  $('frame').src = `https://hebrewbooks.org/pdfpager.aspx?req=${id}`;
  $('viewer').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeV() {
  $('viewer').classList.remove('open');
  $('frame').src='';
  document.body.style.overflow='';
}
function dlBook() {
  if(!S.bid) return;
  window.open(`https://hebrewbooks.org/pdfs/${S.bid}.pdf`,'_blank');
}
function newTab() {
  if(!S.bid) return;
  window.open(`https://hebrewbooks.org/pdfpager.aspx?req=${S.bid}`,'_blank');
}

// ══ SEARCH EVENTS ══════════════════════════════════
let _st;
$('q').addEventListener('input', e => {
  clearTimeout(_st);
  const v = e.target.value.trim();
  if (!v) { goHome(); return; }
  S.q=v; S.page=1; S.mode='search'; S.subject='';
  _st = setTimeout(loadSearch, 400);
});
$('q').addEventListener('keydown', e => {
  if(e.key==='Enter') { clearTimeout(_st); S.q=e.target.value.trim(); S.page=1; loadSearch(); }
});
document.addEventListener('keydown', e => { if(e.key==='Escape') closeV(); });

// ══ BOOT ═══════════════════════════════════════════
refreshStats();
setInterval(refreshStats, 6000);
goHome();
</script>
</body>
</html>
